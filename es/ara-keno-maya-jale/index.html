nte; **bhoga** — placer; **āśe,** — deseo; **bandī** — atado; **ho’ye** — está; **māyā-pāśe** — en la red de *māyā*; **rohile** — permanece; **vikṛta** — anormal; **bhāve** — condición; **daṇḍya** — ser castigado; **jathā** — tal como; **para** — de otros; **dhīna** — dependiente.\"],\"translation\":[\"Anhelando saborear placeres patéticos, permaneces atrapado en *māyā*. Tu vida no es natural. Estás enfermo de corazón. Al depender de los demás, eres castigado una y otra vez.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"ati\",\"trans\":\"muy\",\"sep\":\" \"},{\"text\":\"tuccha\",\"trans\":\"insignificante\",\"sep\":\" \"},{\"text\":\"bhoga\",\"trans\":\"placer\",\"sep\":\"-\"},{\"text\":\"āśe\",\"trans\":\"deseo\",\"sep\":\", \"},{\"text\":\"bandī\",\"trans\":\"atado\",\"sep\":\" \"},{\"text\":\"ho’ye\",\"trans\":\"está\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"māyā-pāśe\",\"trans\":\"en la red de *māyā*\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"rohile\",\"trans\":\"permanece\",\"sep\":\" \"},{\"text\":\"vikṛta\",\"trans\":\"anormal\",\"sep\":\"-\"},{\"text\":\"bhāve\",\"trans\":\"condición\",\"sep\":\" \"},{\"text\":\"daṇḍya\",\"trans\":\"ser castigado\",\"sep\":\" \"},{\"text\":\"jathā\",\"trans\":\"tal como\",\"sep\":\" \"},{\"text\":\"parādhīna\",\"trans\":\"de otros\",\"sep\":\"\",\"error\":\"mismatch\"}]]},{\"number\":\"3\",\"text\":[\"ekhona bhakati-bale, kṛṣṇa-prema-sindhu-jale\",\"krīḍā kori’ anāyāse thāko tumi kṛṣṇādhīna\"],\"word_by_word\":[\"**ekhona** — aquel; **bhakati** — servicio devocional; **bale** — por el poder; **kṛṣṇa-prema** — del amor por Kṛṣṇa; **sindhu** — el océano; **jale** — en las aguas; **krīḍā** — jugar; **kori’** — hacer; **anāyāse** — fácilmente; **thāko** — permanece; **tumi** — tú; **kṛṣṇa** — del Señor Kṛṣṇa; **adhīna** — dependiente.\"],\"translation\":[\"Por el poder del servicio devocional, serás libre. Jugando en el océano del amor por Śrī Kṛṣṇa, tomarás refugio en Śrī Kṛṣṇa y serás Su sirviente.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"ekhona\",\"trans\":\"aquel\",\"sep\":\" \"},{\"text\":\"bhakati\",\"trans\":\"servicio devocional\",\"sep\":\"-\"},{\"text\":\"bale\",\"trans\":\"por el poder\",\"sep\":\", \"},{\"text\":\"kṛṣṇa-prema\",\"trans\":\"del amor por Kṛṣṇa\",\"sep\":\"-\",\"error\":\"multi\"},{\"text\":\"sindhu\",\"trans\":\"el océano\",\"sep\":\"-\"},{\"text\":\"jale\",\"trans\":\"en las aguas\",\"sep\":\"\"}],[{\"text\":\"krīḍā\",\"trans\":\"jugar\",\"sep\":\" \"},{\"text\":\"kori\",\"trans\":\"hacer\",\"sep\":\"’ \"},{\"text\":\"anāyāse\",\"trans\":\"fácilmente\",\"sep\":\" \"},{\"text\":\"thāko\",\"trans\":\"permanece\",\"sep\":\" \"},{\"text\":\"tumi\",\"trans\":\"tú\",\"sep\":\" \"},{\"text\":\"kṛṣṇādhīna\",\"trans\":\"del Señor Kṛṣṇa\",\"sep\":\"\",\"error\":\"mismatch\"}]]}],\"resources\":{},\"hasWbw\":true,\"hasVersesText\":true,\"hasVersesTranslations\":true,\"fullInlineWbw\":false}}],false]}]}],\"$L39\",\"$L3a\"]}]]}],\"$L3b\"]}],\"$L3c\",\"$L3d\",\"$L3e\"]}]]}]\n"])</script><script>self.__next_f.push([1,"3f:I[4423,[\"5842\",\"static/chunks/5842-7e56d350933c83c0.js\",\"7984\",\"static/chunks/7984-5c75571e23a8f6ce.js\",\"1552\",\"static/chunks/1552-37c954ff35c4ac3d.js\",\"4989\",\"static/chunks/app/%5BbookId%5D/%5Bslug%5D/page-b93d45e2966de543.js\"],\"default\"]\n40:I[9181,[\"5842\",\"static/chunks/5842-7e56d350933c83c0.js\",\"7984\",\"static/chunks/7984-5c75571e23a8f6ce.js\",\"1552\",\"static/chunks/1552-37c954ff35c4ac3d.js\",\"4989\",\"static/chunks/app/%5BbookId%5D/%5Bslug%5D/page-b93d45e2966de543.js\"],\"default\"]\n41:I[9508,[\"5842\",\"static/chunks/5842-7e56d350933c83c0.js\",\"7984\",\"static/chunks/7984-5c75571e23a8f6ce.js\",\"1552\",\"static/chunks/1552-37c954ff35c4ac3d.js\",\"4989\",\"static/chunks/app/%5BbookId%5D/%5Bslug%5D/page-b93d45e2966de543.js\"],\"GoogleAnalytics\"]\n42:I[8550,[\"5842\",\"static/chunks/5842-7e56d350933c83c0.js\",\"7984\",\"static/chunks/7984-5c75571e23a8
