nciando a todos mis deseos mundanos, los cuales están dando lugar a varios tipos de ataduras, abandonaré esta existencia material oscura y espantosa.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"kabe\",\"trans\":\"¿cuándo?\",\"sep\":\" \"},{\"text\":\"ha’be\",\"trans\":\"será\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"heno\",\"trans\":\"así\",\"sep\":\" \"},{\"text\":\"daśā\",\"trans\":\"condición\",\"sep\":\" \"},{\"text\":\"mora\",\"trans\":\"mía\",\"sep\":\"\"}],[{\"text\":\"tyaji\",\"trans\":\"renunciar\",\"sep\":\"’ \"},{\"text\":\"jaḍa\",\"trans\":\"material\",\"sep\":\" \"},{\"text\":\"āśā\",\"trans\":\"deseo\",\"sep\":\",    \"},{\"text\":\"vividha\",\"trans\":\"diversas\",\"sep\":\" \"},{\"text\":\"bandhana\",\"trans\":\"ataduras\",\"sep\":\",\"}],[{\"text\":\"chāḍibo\",\"trans\":\"abandonaré\",\"sep\":\" \"},{\"text\":\"saṁsāra\",\"trans\":\"vida familiar\",\"sep\":\" \"},{\"text\":\"ghora\",\"trans\":\"horrible\",\"sep\":\"\"}]]},{\"number\":\"2\",\"text\":[\"vṛndāvanābhede,    nabadvīpa-dhāme,\",\"        bandhibo kuṭīra-khāni\",\"śachīra nandana-        charaṇa-āśray\",\"        koribo sambandha māni’\"],\"word_by_word\":[\"**vṛndāvana** — de Vṛndāvan; **abhede** — no diferente; **nabadvīpa-dhāme** — la morada de Nabadwīp; **bandhibo** — juntaré; **kuṭīra-khāni** — una choza; **śachīra** — de Madre Śachī; **nandana** — el querido hijo; **charaṇa** — los pies; **āśray** — refugio; **koribo** — haré; **sambandha** — relación; **māni** — saber.\"],\"translation\":[\"Construiré mi pequeña choza en Nabadwīp Dhām, considerando que la tierra no es diferente de Vṛndāvan Dhām. Allí estableceré finalmente mi relación bajo el amparo de los pies de loto del hijo de Madre Śachī.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"vṛndāvanābhede\",\"trans\":\"de Vṛndāvan\",\"sep\":\",    \",\"error\":\"mismatch\"},{\"text\":\"nabadvīpa\",\"trans\":\"no diferente\",\"sep\":\"-\",\"error\":\"mismatch\"},{\"te ,\"error\":\"multi\"},{\"text\":\"nirantara\",\"trans\":\"siempre\",\"sep\":\" \"},{\"text\":\"pibo\",\"trans\":\"beberé\",\"sep\":\",\"}],[{\"text\":\"ḍākibo\",\"trans\":\"llamaré\",\"sep\":\" \"},{\"text\":\"‘gaurāṅga\",\"trans\":\"Gaurāṅga\",\"sep\":\"’ \"},{\"text\":\"bo’le\",\"trans\":\"al decir\",\"sep\":\"\",\"error\":\"multi\"}]]},{\"number\":\"4\",\"text\":[\"hā gaura-nitāi,        torā du’ṭi bhāi,\",\"        patita-janer bandhu\",\"adhama patita,        āmi he durjana,\",\"        hao more kṛpā sindhu\"],\"word_by_word\":[\"**hā** — ¡oh!; **gaura-nitāi** — Gaura y Nitāi; **torā** — ustedes; **du’ṭi** — dos; **bhāi** — hermanos; **patita-janer** — de las personas caídas; **bandhu** — amigo; **adhama** — bajo; **patita** — caído; **āmi** — yo; **he** — ¡oh!; **durjana** — malvado; **hao** — soy; **more** — a mí; **kṛpā** — misericordia; **sindhu** — océano.\"],\"translation\":[\"“¡Oh, Gaura Nitai! ¡Ustedes dos hermanos son los únicos amigos verdaderos de todas las almas caídas! Soy el más bajo de los bajos, el más caído y de mente malvada, tan amablemente concédanme Su océano de misericordia.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"hā\",\"trans\":\"¡oh!\",\"sep\":\" \"},{\"text\":\"gaura-nitāi\",\"trans\":\"Gaura y Nitāi\",\"sep\":\",        \",\"error\":\"multi\"},{\"text\":\"torā\",\"trans\":\"ustedes\",\"sep\":\" \"},{\"text\":\"du’ṭi\",\"trans\":\"dos\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"bhāi\",\"trans\":\"hermanos\",\"sep\":\",\"}],[{\"text\":\"patita-janer\",\"trans\":\"de las personas caídas\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"bandhu\",\"trans\":\"amigo\",\"sep\":\"\"}],[{\"text\":\"adhama\",\"trans\":\"bajo\",\"sep\":\" \"},{\"text\":\"patita\",\"trans\":\"caído\",\"sep\":\",        \"},{\"text\":\"āmi\",\"trans\":\"yo\",\"sep\":\" \"},{\"text\":\"he\",\"trans\":\"¡oh!\",\"sep\":\" \"},{\"text\":\"durjana\",\"trans\":\"malvado\",\"sep\":\",\"}],[{\"text\":\"hao\",\"trans\":\"soy\",\"sep\":
