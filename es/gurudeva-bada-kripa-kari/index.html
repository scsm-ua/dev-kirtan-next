,{\"text\":\"kṛpā\",\"trans\":\"misericordia\",\"sep\":\" \"},{\"text\":\"kari\",\"trans\":\"hacer\",\"sep\":\"’,        \"},{\"text\":\"gauḍa\",\"trans\":\"de la tierra de ‘Gauḍa’, la región donde Śrīman Mahāprabhu realizó Sus Pasatiempos\",\"sep\":\"-\"},{\"text\":\"vana\",\"trans\":\"el bosque\",\"sep\":\"-\"},{\"text\":\"mājhe\",\"trans\":\"en medio\",\"sep\":\"\"}],[{\"text\":\"godrume\",\"trans\":\"en la isla de ‘Godruma’\",\"sep\":\" \"},{\"text\":\"diyācha\",\"trans\":\"ha dado\",\"sep\":\" \"},{\"text\":\"sthāna\",\"trans\":\"un lugar\",\"sep\":\"\"}],[{\"text\":\"ājñā\",\"trans\":\"orden\",\"sep\":\" \"},{\"text\":\"dila\",\"trans\":\"dar\",\"sep\":\" \"},{\"text\":\"more\",\"trans\":\"a mí\",\"sep\":\",        \"},{\"text\":\"ei\",\"trans\":\"eso\",\"sep\":\" \"},{\"text\":\"vraje\",\"trans\":\"en Vraja (en Nabadwīp la cual no es diferente de Vraja)\",\"sep\":\" \"},{\"text\":\"vasi\",\"trans\":\"residir\",\"sep\":\"’,\"}],[{\"text\":\"hari\",\"trans\":\"del Señor\",\"sep\":\"-\"},{\"text\":\"nāma\",\"trans\":\"el Nombre\",\"sep\":\" \"},{\"text\":\"kara\",\"trans\":\"hace\",\"sep\":\" \"},{\"text\":\"gāna\",\"trans\":\"canción\",\"sep\":\"\"}]]},{\"number\":\"2\",\"text\":[\"kintu kabe prabho,    yogyatā arpibe,\",\"        e dāsere dayā kari’\",\"chitta sthira habe,    sakala sahiba,\",\"        ekānte bhajiba hari\"],\"word_by_word\":[\"**kintu** — pero; **kabe** — ¿cuándo?; **prabho** — ¡oh maestro!; **yogyatā** — calificación; **arpibe** — darás; **e** — eso; **dāsere** — al sirviente; **dayā** — misericordia; **kari’** — hacer; **chitta** — el corazón; **sthira** — firme; **habe** — será; **sakala** — todo; **sahiba** — toleraré; **ekānte** — en un lugar solitario; **bhajiba** — serviré sinceramente; **hari** — mi Señor.\"],\"translation\":[\"Pero, ¿cuándo, ¡oh señor!, concederás misericordiosamente a este sirviente la calificación para hacer esto? Entonces mi corazón se volverá firme, lo toleraré todo y serviré al Señor sinceramente.\"],\"isWbwInli
