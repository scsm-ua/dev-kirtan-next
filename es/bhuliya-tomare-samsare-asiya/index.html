\"},{\"text\":\"prabhu\",\"trans\":\"¡oh Señor!\",\"sep\":\"!    \"},{\"text\":\"dekhā\",\"trans\":\"vista\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"diyā\",\"trans\":\"dando\",\"sep\":\" \"},{\"text\":\"more\",\"trans\":\"a mí\",\"sep\":\",\"}],[{\"text\":\"vañchile\",\"trans\":\"privado\",\"sep\":\" \"},{\"text\":\"e\",\"trans\":\"este\",\"sep\":\" \"},{\"text\":\"dīna\",\"trans\":\"pobre\",\"sep\":\" \"},{\"text\":\"dāse\",\"trans\":\"a este sirviente\",\"sep\":\"\"}]]},{\"number\":\"3\",\"text\":[\"takhana bhāvinu,    janama pāiyā,\",\"        kariba bhajana tava\",\"janama ha-ila,        paḍi’ māyā-jāle,\",\"        nā ha-ila jñāna-lava\"],\"word_by_word\":[\"**takhana** — entonces; **bhāvinu** — pensé; **janama** — nacimiento; **pāiyā** — obteniendo; **kariba** — haría; **bhajana** — servicio; **tava** — Tu; **janama** — nacimiento; **ha-ila** — ocurrió; **paḍi’** — cayendo; **māyā** — de *m**āyā*; **jāle** — en la red (trampa); **nā** — no; **ha-ila** — se volvió; **jñāna** — del conocimiento; **lava** — una fracción.\"],\"translation\":[\"En ese momento pensé que me ocuparía en Tu servicio después de nacer. Sin embargo, cuando nací, caí en la trampa de māyā, y no quedó ni un rastro de tal conciencia.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"takhana\",\"trans\":\"entonces\",\"sep\":\" \"},{\"text\":\"bhāvinu\",\"trans\":\"pensé\",\"sep\":\",    \"},{\"text\":\"janama\",\"trans\":\"nacimiento\",\"sep\":\" \"},{\"text\":\"pāiyā\",\"trans\":\"obteniendo\",\"sep\":\",\"}],[{\"text\":\"kariba\",\"trans\":\"haría\",\"sep\":\" \"},{\"text\":\"bhajana\",\"trans\":\"servicio\",\"sep\":\" \"},{\"text\":\"tava\",\"trans\":\"Tu\",\"sep\":\"\"}],[{\"text\":\"janama\",\"trans\":\"nacimiento\",\"sep\":\" \"},{\"text\":\"ha-ila\",\"trans\":\"ocurrió\",\"sep\":\",        \",\"error\":\"multi\"},{\"text\":\"paḍi\",\"trans\":\"cayendo\",\"sep\":\"’ \"},{\"text\":\"māyā\",\"trans\":\"de *m\",\"sep\":\"-\"},{\"text\":\"jāle\",\"trans\": :\"bhāla\",\"trans\":\"bien\",\"sep\":\"\"}]]},{\"number\":\"5\",\"text\":[\"krame dina dina,    bālaka ha-iyā,\",\"        khelinu bālaka saha\",\"āra kichhu-dine,        jñāna upajila,\",\"        pāṭha paḍi ahar-ahaḥ\"],\"word_by_word\":[\"**krame** — gradualmente; **dina** — día; **dina** — día; **bālaka** — un niño; **ha-iyā** — volviéndose; **khelinu** — jugué; **bālaka** — niños; **saha** — con; **āra** — más; **kichhu** — algo; **dine** — tras día; **jñāna** — facultad de conocimiento; **upajila** — surgió; **pāṭha** — lecciones; **paḍi** — estudié; **ahar-ahaḥ** — día tras día (todo el tiempo).\"],\"translation\":[\"Día a día me convertí en un niño y jugué con otros chicos jóvenes. Más tarde mi intelecto se desarrolló, y estudié mis lecciones día tras día.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"krame\",\"trans\":\"gradualmente\",\"sep\":\" \"},{\"text\":\"dina\",\"trans\":\"día\",\"sep\":\" \"},{\"text\":\"dina\",\"trans\":\"día\",\"sep\":\",    \"},{\"text\":\"bālaka\",\"trans\":\"un niño\",\"sep\":\" \"},{\"text\":\"ha-iyā\",\"trans\":\"volviéndose\",\"sep\":\",\",\"error\":\"multi\"}],[{\"text\":\"khelinu\",\"trans\":\"jugué\",\"sep\":\" \"},{\"text\":\"bālaka\",\"trans\":\"niños\",\"sep\":\" \"},{\"text\":\"saha\",\"trans\":\"con\",\"sep\":\"\"}],[{\"text\":\"āra\",\"trans\":\"más\",\"sep\":\" \"},{\"text\":\"kichhu\",\"trans\":\"algo\",\"sep\":\"-\"},{\"text\":\"dine\",\"trans\":\"tras día\",\"sep\":\",        \"},{\"text\":\"jñāna\",\"trans\":\"facultad de conocimiento\",\"sep\":\" \"},{\"text\":\"upajila\",\"trans\":\"surgió\",\"sep\":\",\"}],[{\"text\":\"pāṭha\",\"trans\":\"lecciones\",\"sep\":\" \"},{\"text\":\"paḍi\",\"trans\":\"estudié\",\"sep\":\" \"},{\"text\":\"ahar-ahaḥ\",\"trans\":\"día tras día (todo el tiempo)\",\"sep\":\"\",\"error\":\"multi\"}]]},{\"number\":\"6\",\"text\":[\"vidyāra gaurave,        bhrami’ deśe deśe,\",\"        dhana upārjana kari’\",\"svajana-pālana,        kari eka-mane,\",\"        bhulinu tomāre hari!\"],\"word_by_word\":[\"**vidyāra** — aprendizaje; **gaurave** — por la fuerza; **bhrami’** — viajar; **deśe** — en un país; **deśe** — en (otro) país; **dhana** — riqueza; **upārjana** — ganancia; **kari’** — hacer; **svajana** — parientes; **pālana** — mantener; **kari** — hago; **eka** — único; **mane** — con una mente; **bhulinu** — olvidé; **tomāre** — acerca de Tí; **hari!** — ¡oh Señor!\"],\"translation\":[\"Luego, por la fuerza de mi aprendizaje, viajé de un lugar a otro, gané dinero y mantuve a mi familia con íntegra atención. ¡Te olvidé, Señor!\"],\"isWbwInlineModeAvailable\":true,\"inline_word_by_word\":[[{\"text\":\"vidyāra\",\"trans\":\"aprendizaje\",\"sep\":\" \"},{\"text\":\"gaurave\",\"trans\":\"por la fuerza\",\"sep\":\",        \"},{\"text\":\"bhrami\",\"trans\":\"viajar\",\"sep\":\"’ \"},{\"text\":\"deśe\",\"trans\":\"en un país\",\"sep\":\" \"},{\"text\":\"deśe\",\"trans\":\"en (otro) país\",\"sep\":\",\"}],[{\"text\":\"dhana\",\"trans\":\"riqueza\",\"sep\":\" \"},{\"text\":\"upārjana\",\"trans\":\"ganancia\",\"sep\":\" \"},{\"text\":\"kari\",\"trans\":\"hacer\",\"sep\":\"’\"}],[{\"text\":\"svajana\",\"trans\":\"parientes\",\"sep\":\"-\"},{\"text\":\"pālana\",\"trans\":\"mantener\",\"sep\":\",        \"},{\"text\":\"kari\",\"trans\":\"hago\",\"sep\":\" \"},{\"text\":\"eka\",\"trans\":\"único\",\"sep\":\"-\"},{\"text\":\"mane\",\"trans\":\"con una mente\",\"sep\":\",\"}],[{\"text\":\"bhulinu\",\"trans\":\"olvidé\",\"sep\":\" \"},{\"text\":\"tomāre\",\"trans\":\"acerca de Tí\",\"sep\":\" \"},{\"text\":\"hari\",\"trans\":\"¡oh Señor!\",\"sep\":\"!\"}]]},{\"number\":\"7\",\"text\":[\"vārddhakye ekhana,    bhakati-vinoda,\",\"        kā̐diyā kātara ati\",\"nā bhajiyā tore,        dina vṛthā gelo\",\"        ekhon ki ho’be gati!\"],\"word_by_word\":[\"**vārddhakye** — en la vejez; **ekhana** — ahora; **bhakati-vinoda** — Bhakti Vinod; **kāndiyā** — llorando; **kātara** — angustiado; **ati** — muy; **nā** — no; **bhajiyā** — servir; **tore** — a Tí; **dina** — días; **vṛthā** — vano; **gela** — pasados; **ekhana** — ahora; **ki** — ¿qué?; **habe** — será; **gati** — destino.\"],\"translation\":[\"Ahora anciano, Bhakti Vinod llora con gran angustia, “sin servirte, he pasado mis días en vano. ¿Cuál será mi destino ahora?”\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"vārddhakye\",\"trans\":\"en la vejez\",\"sep\":\" \"},{\"text\":\"ekhana\",\"trans\":\"ahora\",\"sep\":\",    \"},{\"text\":\"bhakati-vinoda\",\"trans\":\"Bhakti Vinod\",\"sep\":\",\",\"error\":\"multi\"}],[{\"text\":\"kā̐diyā\",\"trans\":\"llorando\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"kātara\",\"trans\":\"angustiado\",\"sep\":\" \"},{\"text\":\"ati\",\"trans\":\"muy\",\"sep\":\"\"}],[{\"text\":\"nā\",\"trans\":\"no\",\"sep\":\" \"},{\"text\":\"bhajiyā\",\"trans\":\"servir\",\"sep\":\" \"},{\"text\":\"tore\",\"trans\":\"a Tí\",\"sep\":\",        \"},{\"text\":\"dina\",\"trans\":\"días\",\"sep\":\" \"},{\"text\":\"vṛthā\",\"trans\":\"vano\",\"sep\":\" \"},{\"text\":\"gelo\",\"trans\":\"pasados\",\"sep\":\"\",\"error\":\"mismatch\"}],[{\"text\":\"ekhon\",\"trans\":\"ahora\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"ki\",\"trans\":\"¿qué?\",\"sep\":\" \"},{\"text\":\"ho\",\"trans\":\"será\",\"sep\":\"’\",\"error\":\"mismatch\"},{\"text\":\"be\",\"trans\":\"destino\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"gati\",\"trans\":\"-\",\"sep\":\"!\",\"error\":\"mismatch\"}]]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.S. Govinda Dev-Goswami Maharaj\",\"ru\":\"Шрила Б.С. Говинда Дев-Госвами Махарадж\",\"ua\":\"Шріла Б.С. Ґовінда Дев-Ґосвамі Махарадж\"},\"embed_url\":\"https://soundcloud.com/kostya-netrebenko/18-bhuliya-tomare-samsara-asiya-8\"}]},\"hasWbw\":true,\"hasVersesText\":true,\"hasVersesTranslations\":true,\"fullInlineWbw\":false}}]\n"])</script><script>self.__next_f.push([1,"3d:[\"$\",\"$L45\",null,{\"audio\":\"$3c:props:song:resources:audio\",\"language\":\
