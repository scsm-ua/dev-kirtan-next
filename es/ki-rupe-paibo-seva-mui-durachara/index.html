vā mui durāchāra\",\"śrī-guru-vaiṣṇave rati na hoilo āmāra\"],\"word_by_word\":[\"**ki-rūpe** — ¿cómo?; **pāibo** — obtendré; **sevā** — servicio; **mui** — yo; **durāchāra** — mal comportamiento; **śrī-guru** — del maestro espiritual; **vaiṣṇave** — y los Vaiṣṇavas; **rati** — apego; **na** — no; **hoilo** — es; **āmāra** — mío.\"],\"translation\":[\"No tengo apego devocional alguno ni por mi Maestro Espiritual ni por los Vaiṣṇavas. ¿Cómo será posible para un bribón como yo obtener el servicio devocional?\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"ki-rūpe\",\"trans\":\"¿cómo?\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"pāibo\",\"trans\":\"obtendré\",\"sep\":\" \"},{\"text\":\"sevā\",\"trans\":\"servicio\",\"sep\":\" \"},{\"text\":\"mui\",\"trans\":\"yo\",\"sep\":\" \"},{\"text\":\"durāchāra\",\"trans\":\"mal comportamiento\",\"sep\":\"\"}],[{\"text\":\"śrī-guru\",\"trans\":\"del maestro espiritual\",\"sep\":\"-\",\"error\":\"multi\"},{\"text\":\"vaiṣṇave\",\"trans\":\"y los Vaiṣṇavas\",\"sep\":\" \"},{\"text\":\"rati\",\"trans\":\"apego\",\"sep\":\" \"},{\"text\":\"na\",\"trans\":\"no\",\"sep\":\" \"},{\"text\":\"hoilo\",\"trans\":\"es\",\"sep\":\" \"},{\"text\":\"āmāra\",\"trans\":\"mío\",\"sep\":\"\"}]]},{\"number\":\"2\",\"text\":[\"aśeṣa māyāte mana magana hoilo\",\"vaiṣṇavete leśa-mātra rati nā janmilo\"],\"word_by_word\":[\"**aśeṣa** — completamente; **māyāte** — en la ilusión; **mana** — mi mente; **magana** — inmersa; **hoilo** — está; **vaiṣṇavete** — de los Vaiṣṇavas; **leśa** — un poco; **mātra** — aunque; **rati** — devoción; **nā** — no; **janmilo** — se manifiesta.\"],\"translation\":[\"Mi mente siempre está sumida en la ilusión. No tengo ni un ápice de devoción por los Vaiṣṇavas.\"],\"isWbwInlineModeAvailable\":true,\"inline_word_by_word\":[[{\"text\":\"aśeṣa\",\"trans\":\"completamente\",\"sep\":\" \"},{\"text\":\"māyāte\",\"trans\":\"en la ilusión\",\"sep\":\" \"},{\"text\":\"mana\",\"trans\":\"mi mente\",\"sep\":\" \"},{\"text\":\"magana\",\"trans\":\"inmersa\",\"sep\":\" \"},{\"text\":\"hoilo\",\"trans\":\"está\",\"sep\":\"\"}],[{\"text\":\"vaiṣṇavete\",\"trans\":\"de los Vaiṣṇavas\",\"sep\":\" \"},{\"text\":\"leśa\",\"trans\":\"un poco\",\"sep\":\"-\"},{\"text\":\"mātra\",\"trans\":\"aunque\",\"sep\":\" \"},{\"text\":\"rati\",\"trans\":\"devoción\",\"sep\":\" \"},{\"text\":\"nā\",\"trans\":\"no\",\"sep\":\" \"},{\"text\":\"janmilo\",\"trans\":\"se manifiesta\",\"sep\":\"\"}]]},{\"number\":\"3\",\"text\":[\"biṣoye bhuliya andha hoinu divā-niśi\",\"gole phā̐sa dite phere māyā se piśāchī\"],\"word_by_word\":[\"**biṣoye** — de los objetos de los sentidos; **bhuliya** — considerar; **andha** — ciego; **hoinu** — me convertí; **divā** — día; **niśi** — y noche; **gole** — alrededor de mi cuello; **phā̐sa** — el nudo; **dite** — colocado; **phere** — se mueve; **māyā** — la ilusión; **se** — esa; **piśāchī** — bruja.\"],\"translation\":[\"Me he vuelto ciego por meditar constantemente en los objetos de los sentidos. La bruja Māyādevī ha puesto un lazo de verdugo alrededor de mi cuello.\"],\"isWbwInlineModeAvailable\":true,\"inline_word_by_word\":[[{\"text\":\"biṣoye\",\"trans\":\"de los objetos de los sentidos\",\"sep\":\" \"},{\"text\":\"bhuliya\",\"trans\":\"considerar\",\"sep\":\" \"},{\"text\":\"andha\",\"trans\":\"ciego\",\"sep\":\" \"},{\"text\":\"hoinu\",\"trans\":\"me convertí\",\"sep\":\" \"},{\"text\":\"divā\",\"trans\":\"día\",\"sep\":\"-\"},{\"text\":\"niśi\",\"trans\":\"y noche\",\"sep\":\"\"}],[{\"text\":\"gole\",\"trans\":\"alrededor de mi cuello\",\"sep\":\" \"},{\"text\":\"phā̐sa\",\"trans\":\"el nudo\",\"sep\":\" \"},{\"text\":\"dite\",\"trans\":\"colocado\",\"sep\":\" \"},{\"text\":\"phere\",\"trans\":\"se mueve\",\"sep\":\" \"},{\"text\":\"māyā\",\"trans\":\"la ilusión\",\"sep\":\" \"},{\"text\":\"se\",\"trans\":\"esa\",\"sep\":\" \"},{\"text\":\"piśāchī\",\"trans\":\"bruja\",\"sep\":\"\"}]]},{\"number\":\"4\",\"text\":[\"māyāre kariyā jaya chāḍāna na jāya\",\"sādhu-kṛpā vinā āra nahika upāya\"],\"word_by_word\":[\"**māyāre** — de *māyā*; **kariyā** — habiendo hecho; **jaya** — victoria; **chāḍāna** — alivio; **na** — no; **jāya** — obtener; **sādhu** — devoto santo; **kṛpā** — misericordia; **vinā** — desprovisto; **āra** — y; **nahika** — no hay; **upāya** — remedio.\"],\"translation\":[\"Incluso si yo pudiera curar mi ceguera y derrotara a Māyā en esa forma de verdugo, no podría liberarme de la ilusión material sin la misericordia de los santos devotos.\"],\"isWbwInlineModeAvailable\":true,\"inline_word_by_word\":[[{\"text\":\"māyāre\",\"trans\":\"de *māyā*\",\"sep\":\" \"},{\"text\":\"kariyā\",\"trans\":\"habiendo hecho\",\"sep\":\" \"},{\"text\":\"jaya\",\"trans\":\"victoria\",\"sep\":\" \"},{\"text\":\"chāḍāna\",\"trans\":\"alivio\",\"sep\":\" \"},{\"text\":\"na\",\"trans\":\"no\",\"sep\":\" \"},{\"text\":\"jāya\",\"trans\":\"obtener\",\"sep\":\"\"}],[{\"text\":\"sādhu\",\"trans\":\"devoto santo\",\"sep\":\"-\"},{\"text\":\"kṛpā\",\"trans\":\"misericordia\",\"sep\":\" \"},{\"text\":\"vinā\",\"trans\":\"desprovisto\",\"sep\":\" \"},{\"text\":\"āra\",\"trans\":\"y\",\"sep\":\" \"},{\"text\":\"nahika\",\"trans\":\"no hay\",\"sep\":\" \"},{\"text\":\"upāya\",\"trans\":\"remedio\",\"sep\":\"\"}]]},{\"number\":\"5\",\"text\":[\"adoṣa daraśi-prabhu patita-uddhāra\",\"ei-bāro narottame karaha nistāra\"],\"word_by_word\":[\"**adoṣa-daraśi** — purificador; **prabhu** — señor; **patita** — caído; **uddhāra** — liberador; **ei-bāro** — esta vez; **narottame** — a Narottam; **karaha nistāra** — por favor, libera.\"],\"translation\":[\"¡Oh, amo! ¡Oh, purificador de los pecadores! ¡Oh, salvador de las almas caídas! Tú no ves las faltas de los demás; por favor, redime a este Narottam Dās.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"adoṣa daraśi\",\"trans\":\"purificador\",\"sep\":\"-\",\"error\":\"multi\"},{\"text\":\"prabhu\",\"trans\":\"señor\",\"sep\":\" \"},{\"text\":\"patita\",\"trans\":\"caído\",\"sep\":\"-\"},{\"text\":\"uddhāra\",\"trans\":\"liberador\",\"sep\":\"\"}],[{\"text\":\"ei-bāro\",\"trans\":\"esta vez\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"narottame\",\"trans\":\"a Narottam\",\"sep\":\" \"},{\"text\":\"karaha nistāra\",\"trans\":\"por favor, libera\",\"sep\":\"\",\"error\":\"multi\"}]]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.N. Acharya Maharaj\",\"ru\":\"Шрила Б.Н. Ачарья Махарадж\",\"ua\":\"Шріла Б.Н. Ачарʼя Махарадж\"},\"embed_url\":\"https://soundcloud.com/kostya-netrebenko/015-kirupepaibaseva-7\"}]},\"hasWbw\":true,\"hasVersesText\":true,\"hasVersesTranslations\":true,\"fullInlineWbw\":false}}]\n"])</script><script>self.__next_f.push([1,"40:[\"$\",\"$L49\",null,{\"audio\":\"$3f:props:song:resources:audio\",\"language\":\"es\"}]\n41:[\"$\",\"$L4a\",null,{\"navMap\":{\"161\":{\"prev\":{\"path\":\"/es/krishnotkirtana-gana-nartana-parau/\",\"title\":\"Śrī Śrī Ṣaḍ-goswāmi-aṣṭakam\"},\"next\":{\"path\":\"/es/bhajahu-re-mana-shri-nanda-nandana/\",\"title\":\"Bhajahū̐ Re Mana\"}}}}]\n4b:T5a4,{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"CollectionPage\",\"@id\":\"https://dev.kirtan.site/es/ki-rupe-paibo-seva-mui-durachara\",\"url\":\"https://dev.kirtan.site/es/ki-rupe-paibo-seva-mui-durachara\",\"name\":\"Vaiṣṇava Vijñāpti, 3. Śrīla Narottam Dās Ṭhākur\",\"inLanguage\":\"es\",\"isPartOf\":{\"@id\":\"https://dev.kirtan.site/#website\"}},{\"@type\":\"MusicComposition\",\"@id\":\"https://dev.kirtan.site/es/ki-rupe-paibo-seva-mui-durachara#composition\",\"alternateName\":[\"ki-rūpe pāibo sevā mui durāchāra\"],\"name\":\"Vaiṣṇava Vijñāpti, 3. Śrīla Narottam Dās Ṭhākur\",\"url\":\"https://dev.kirtan.site/es/ki-rupe-paibo-seva-mui-durachara\",\"isPartOf\":{\"@id\":\"https://dev.kirtan.site/#website\"},\"about\":[{\"@type\":\"Thing\",\"name\":\"Bhakti Yoga\"},{\"@type\":\"Thing\",\"name\":\"Gaudiya Vaishnavism\"}],\"genre\":[\"Devotional\",\"Bhajan\",\"Kirtan\"],\"mainEntityOfPage\":{\"@id\":\"https://dev.kir
