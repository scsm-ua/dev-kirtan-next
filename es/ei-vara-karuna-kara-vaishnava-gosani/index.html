},{\"text\":\"vaiṣṇava-gosāi\",\"trans\":\"¡oh, Vaiṣṇava Goswāmī!\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"patita-pāvana\",\"trans\":\"salvador de las almas caídas\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"tomā vine\",\"trans\":\"excepto tú\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"keho nāi\",\"trans\":\"no hay nadie\",\"sep\":\"\",\"error\":\"multi\"}]]},{\"number\":\"2\",\"text\":[\"kāhāra nikaṭe gele pāp dūre jāya\",\"emona doyāla prabhu kebā kothā pāya\"],\"word_by_word\":[\"**kāhāra nikaṭe** — por cuya mera audiencia; **gele** — acercándose; **pāpa** — todos los pecados; **dure jāya** — van lejos; **emona doyāla prabhu** — una personalidad tan misericordiosa; **kebā kothā pāya** — ¿dónde puede encontrar alguien?\"],\"translation\":[\"Solo por estar en tu presencia, los pecados se van muy lejos. ¿Dónde puede alguien encontrar semejante bondad?\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"kāhāra nikaṭe\",\"trans\":\"por cuya mera audiencia\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"gele\",\"trans\":\"acercándose\",\"sep\":\" \"},{\"text\":\"pāp\",\"trans\":\"todos los pecados\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"dūre jāya\",\"trans\":\"van lejos\",\"sep\":\"\",\"error\":\"mismatch\"}],[{\"text\":\"emona doyāla prabhu\",\"trans\":\"una personalidad tan misericordiosa\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"kebā kothā pāya\",\"trans\":\"¿dónde puede encontrar alguien?\",\"sep\":\"\",\"error\":\"multi\"}]]},{\"number\":\"3\",\"text\":[\"gaṅgāra-paraśa hoile paśchāte pāvana\",\"darśane pavitra koro-ei tomāra guṇa\"],\"word_by_word\":[\"**gaṅgāra paraśa hoile** — tocando las aguas del sagrado Ganges; **paśchāte pāvan** — uno se purifica más tarde; **darśane** — solo con verte; **pavitra koro** — purificas inmediatamente; **ei** — esto; **tomāra guṇa** — es tu cualidad.\"],\"translation\":[\"Aunque uno sea el más bajo de la humanidad, se libera simplemente por tocar las aguas del sagrado Ganges, pero, por solo verte, uno logra el mismo resultado. Tal es tu cualidad.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"gaṅgāra-paraśa hoile\",\"trans\":\"tocando las aguas del sagrado Ganges\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"paśchāte pāvana\",\"trans\":\"uno se purifica más tarde\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"darśane\",\"trans\":\"solo con verte\",\"sep\":\" \"},{\"text\":\"pavitra koro\",\"trans\":\"purificas inmediatamente\",\"sep\":\"-\",\"error\":\"multi\"},{\"text\":\"ei\",\"trans\":\"esto\",\"sep\":\" \"},{\"text\":\"tomāra guṇa\",\"trans\":\"es tu cualidad\",\"sep\":\"\",\"error\":\"multi\"}]]},{\"number\":\"4\",\"text\":[\"hari-sthāne aparādhe tāre harināma\",\"tomā-sthāne aparādhe nāhiko eḍāna\"],\"word_by_word\":[\"**hari-sthāne** — al Señor Hari; **aparādhe** — cometer una ofensa; **tāre hari-nām** — el santo nombre los libera; **tomā sthāne aparādhe** — pero si alguien te ofende; **nāhiko** — no podrá; **eḍana** — salvación.\"],\"translation\":[\"Si alguien comete una ofensa a los pies del Señor Hari, puede obtener perdón si canta el Santo Nombre; pero si alguien te ofende a ti, no tiene salvación.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"hari-sthāne\",\"trans\":\"al Señor Hari\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"aparādhe\",\"trans\":\"cometer una ofensa\",\"sep\":\" \"},{\"text\":\"tāre harināma\",\"trans\":\"el santo nombre los libera\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"tomā-sthāne aparādhe\",\"trans\":\"pero si alguien te ofende\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"nāhiko\",\"trans\":\"no podrá\",\"sep\":\" \"},{\"text\":\"eḍāna\",\"trans\":\"salvación\",\"sep\":\"\",\"error\":\"mismatch\"}]]},{\"number\":\"5\",\"text\":[\"tomāra hṛdoye sadā govinda-viśrāma\",\"govinda kohena—mama vaiṣṇava parāna\"],\"word_by_word\":[\"**tomāra hṛdoye** — en tu corazón; **sadā** — siempre; **govinda-viśrāma** — el lugar de descanso del Señor Govinda; **govinda kohena** — el Señor Govinda dice; **mora vaiṣṇava parāṇa** — “los Vaiṣṇavas son mi vida”.\"],\"translation\":[\"Tu corazón es el lugar donde Govinda reside. Śrī Govinda Mismo dice: “Mis devotos son mi vida y alma”.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"tomāra hṛdoye\",\"trans\":\"en tu corazón\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"sadā\",\"trans\":\"siempre\",\"sep\":\" \"},{\"text\":\"govinda-viśrāma\",\"trans\":\"el lugar de descanso del Señor Govinda\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"govinda kohena—mama\",\"trans\":\"el Señor Govinda dice\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"vaiṣṇava parāna\",\"trans\":\"“los Vaiṣṇavas son mi vida”\",\"sep\":\"\",\"error\":\"mismatch\"}]]},{\"number\":\"6\",\"text\":[\"prati janme kori āśā charaṇera dhūli\",\"narottame koro doyā āpnāra boli’\"],\"word_by_word\":[\"**prati-janme** — en cada nacimiento que pueda tener; **kori āśā** — deseo; **charaṇera dhūli** — el polvo de tus santos pies; **narottame** — a Narottama Dās; **koro doyā** — por favor, sé amable; **āpanāra boli’** — y considera que es de tu propiedad.\"],\"translation\":[\"Mi esperanza es recibir el polvo de tus pies de loto en cada nacimiento. Śrī Narottam ora: “Por favor, ¡oh, Vaiṣṇava Goswāmī!, sé generoso conmigo”.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"prati janme\",\"trans\":\"en cada nacimiento que pueda tener\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"kori āśā\",\"trans\":\"deseo\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"charaṇera dhūli\",\"trans\":\"el polvo de tus santos pies\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"narottame\",\"trans\":\"a Narottama Dās\",\"sep\":\" \"},{\"text\":\"koro doyā\",\"trans\":\"por favor, sé amable\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"āpnāra boli\",\"trans\":\"y considera que es de tu propiedad\",\"sep\":\"’\",\"error\":\"mismatch\"}]]}],\"resou
