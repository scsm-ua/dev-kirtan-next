:\"\u003ci class=\\\"SongHeader__term\\\"\u003eśrī\u003c/i\u003e — adorable; \u003ci class=\\\"SongHeader__term\\\"\u003eśikṣa\u003c/i\u003e — instrucciones; \u003ci class=\\\"SongHeader__term\\\"\u003eaṣṭakam\u003c/i\u003e — ocho versos.\"}}]],[[\"$\",\"div\",\"Canción 2\",{\"className\":\"SongHeader__subtitle\",\"children\":\"Canción 2\"}]],[[\"$\",\"div\",\"Śrīla Bhakti Vinod Ṭhākur\",{\"className\":\"SongHeader__author\",\"children\":[\"$\",\"a\",null,{\"href\":\"/es/authors\",\"children\":\"Śrīla Bhakti Vinod Ṭhākur\"}]}]]]}]\n"])</script><script>self.__next_f.push([1,"3e:[\"$\",\"$L47\",null,{\"bookId\":\"es\",\"label\":\"Mostrar traducción\",\"song\":{\"meta\":{\"page\":219,\"first_line\":\"tuhū̐ doyā-sāgara tārayite prāṇī\"},\"title\":[\"Śrī Śikṣāṣṭakam\"],\"word_by_word\":[\"**śrī** — adorable; **śikṣa** — instrucciones; **aṣṭakam** — ocho versos.\"],\"author\":[\"Śrīla Bhakti Vinod Ṭhākur\"],\"subtitle\":[\"Canción 2\"],\"verses\":[{\"text\":[\"nāmnām akāri bahudhā nija-sarva-śaktis\",\"tatrārpitā niyamitaḥ smaraṇe na kālaḥ\",\"etādṛśī tava kṛpā bhagavan mamāpi\",\"durdaivam īdṛśam ihājani nānurāgaḥ\"],\"word_by_word\":[\"**nāmnām** — de los Santos Nombres del Señor; **akāri** — manifestado; **bahudhā** — diversas clases; **nija-sarva-śaktiḥ** — todos los tipos de potencia personal; **tatra** — en eso; **arpita** — otorgado; **niyamitaḥ** — restricción; **smaraṇe** — al recordar; **na** — no; **kālaḥ** — consideración del tiempo; **etādṛśī** — mucha; **tava kṛpā** — Tu misericordia; **bhagavan** — ¡oh, Señor!; **mama** — mi; **api** — aunque; **durdaivam** — desgracia; **īdṛśam** — tal; **iha** — en este (Santo Nombre); **ajani** — nació; **na-anurāgaḥ** — sin apego.\"],\"translation\":[\"¡Oh, mi Señor! Tu Santo Nombre les confiere lo auspicioso a todos. Y Tú tienes ilimitados nombres, tales como Kṛṣṇa y Govinda, mediante los cuales te revelas. En Tus incontables Santos Nombres, bondadosamente has conferido toda Tu potencia trascendental. Y para cantar esos Nombres no existen reglas estrictas concernientes al tiempo o al lugar. Por Tu misericordia sin causa, has descendido en la forma de sonido divino, sin embargo, mi gran infortunio es que no tengo amor por Tu Santo Nombre.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"nāmnām\",\"trans\":\"de los Santos Nombres del Señor\",\"sep\":\" \"},{\"text\":\"akāri\",\"trans\":\"manifestado\",\"sep\":\" \"},{\"text\":\"bahudhā\",\"trans\":\"diversas clases\",\"sep\":\" \"},{\"text\":\"nija-sarva-śaktis\",\"trans\":\"todos los tipos de potencia personal\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"tatrārpitā\",\"trans\":\"en eso\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"niyamitaḥ\",\"trans\":\"otorgado\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"smaraṇe\",\"trans\":\"restricción\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"na\",\"trans\":\"al recordar\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"kālaḥ\",\"trans\":\"no\",\"sep\":\"\",\"error\":\"mismatch\"}],[{\"text\":\"etādṛśī\",\"trans\":\"consideración del tiempo\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"tava\",\"trans\":\"mucha\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"kṛpā bhagavan\",\"trans\":\"Tu misericordia\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"mamāpi\",\"trans\":\"¡oh, Señor!\",\"sep\":\"\",\"error\":\"mismatch\"}],[{\"text\":\"durdaivam\",\"trans\":\"mi\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"īdṛśam\",\"trans\":\"aunque\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"ihājani\",\"trans\":\"desgracia\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"nānurāgaḥ\",\"trans\":\"tal\",\"sep\":\"\",\"error\":\"mismatch\"}]]},{\"number\":\"1\",\"text\":[\"tuhū̐ doyā-sāgara tārayite prāṇī\",\"nāma aneka tuyā śikhāoli āni\"],\"word_by_word\":[\"**tuhū̐** — Tuya; **doyā-sāgara** — océano de misericordia; **tārayite** — liberar; **prāṇī** — las entidades vivientes; **nāma** — el santo nombre; **aneka** — muchas; **tuyā** — de ti; **śikhāoli** — enseña; **āni** — traer.\"],\"translation\":[\"¡Oh, Señor! Eres un océano de misericordia, y, por lo tanto, has traído las enseñanzas de las glorias de Tus ilimitados Santos Nombres para liberar a todas las almas.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"tuhū̐\",\"trans\":\"Tuya\",\"sep\":\" \"},{\"text\":\"doyā-sāgara\",\"trans\":\"océano de misericordia\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"tārayite\",\"trans\":\"liberar\",\"sep\":\" \"},{\"text\":\"prāṇī\",\"trans\":\"las entidades vivientes\",\"sep\":\"\"}],[{\"text\":\"nāma\",\"trans\":\"el santo nombre\",\"sep\":\" \"},{\"text\":\"aneka\",\"trans\":\"muchas\",\"sep\":\" \"},{\"text\":\"tuyā\",\"trans\":\"de ti\",\"sep\":\" \"},{\"text\":\"śikhāoli\",\"trans\":\"enseña\",\"sep\":\" \"},{\"text\":\"āni\",\"trans\":\"traer\",\"sep\":\"\"}]]},{\"number\":\"2\",\"text\":[\"sakala śakati dei nāme tohārā\",\"grahaṇe rākholi nāhi kāla-bichārā\"],\"word_by_word\":[\"**sakala** — todo; **śakati** — poder; **dei** — otorga; **nāme** — el nombre; **tohārā** — de Ti; **grahaṇe** — en aceptar; **rākholi** — proteger; **nāhi** — no; **kāla** — tiempo; **bichārā** — consideraciones.\"],\"translation\":[\"A Tu Nombre le has otorgado toda Tu potencia. Y no hay normas que regulen el lugar y el tiempo apropiados para cantar el Santo Nombre.\"],\"isWbwInlineModeAvailable\":true,\"inline_word_by_word\":[[{\"text\":\"sakala\",\"trans\":\"todo\",\"sep\":\" \"},{\"text\":\"śakati\",\"trans\":\"poder\",\"sep\":\" \"},{\"text\":\"dei\",\"trans\":\"otorga\",\"sep\":\" \"},{\"text\":\"nāme\",\"trans\":\"el nombre\",\"sep\":\" \"},{\"text\":\"tohārā\",\"trans\":\"de Ti\",\"sep\":\"\"}],[{\"text\":\"grahaṇe\",\"trans\":\"en aceptar\",\"sep\":\" \"},{\"text\":\"rākholi\",\"trans\":\"proteger\",\"sep\":\" \"},{\"text\":\"nāhi\",\"trans\":\"no\",\"sep\":\" \"},{\"text\":\"kāla\",\"trans\":\"tiempo\",\"sep\":\"-\"},{\"text\":\"bichārā\",\"trans\":\"consideraciones\",\"sep\":\"\"}]]},{\"number\":\"3\",\"text\":[\"śrī-nāma-chintāmaṇi tohāri samānā\",\"biśve bilāoli koruṇā-nidānā\"],\"word_by_word\":[\"**śrī-nāma-chintāmaṇi** — la joya *chintāmanī* del santo nombre; **tohāri** — en Tí; **samānā** — igual; **biśve** — del mundo; **bilāoli** — dar; **koruṇā-nidānā** — océano de misericordia.\"],\"translation\":[\"El Santo Nombre es una gema *chintāmaṇi*, una piedra de toque divina, que no es diferente de Ti. Debido a Tu bondad hacia todas las almas, has distribuido Tu Santo Nombre por todo el universo.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"śrī-nāma-chintāmaṇi\",\"trans\":\"la joya *chintāmanī* del santo nombre\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"tohāri\",\"trans\":\"en Tí\",\"sep\":\" \"},{\"text\":\"samānā\",\"trans\":\"igual\",\"sep\":\"\"}],[{\"text\":\"biśve\",\"trans\":\"del mundo\",\"sep\":\" \"},{\"text\":\"bilāoli\",\"trans\":\"dar\",\"sep\":\" \"},{\"text\":\"koruṇā-nidānā\",\"trans\":\"océano de misericordia\",\"sep\":\"\",\"error\":\"multi\"}]]},{\"number\":\"4\",\"text\":[\"tuyā doyā aichana parama udārā\",\"atiśoya manda nātha! bhāga hāmārā\"],\"word_by_word\":[\"**tuyā** — Tuyo; **doyā** — misericordia; **aichana** — obtener; **parama** — supremo; **udārā** — generosidad; **atiśoya** — grandioso; **manda** — tonto; **nātha!** — señor; **bhāga** — fortuna; **hāmārā** — de mí.\"],\"translation\":[\"Esta es Tu misericordia, ¡oh, Señor! Eres supremamente bondadoso, pero, ¡oh, Señor! Yo soy de lo más malvado y desafortunado.\"],\"isWbwInlineModeAvailable\":true,\"inline_word_by_word\":[[{\"text\":\"tuyā\",\"trans\":\"Tuyo\",\"sep\":\" \"},{\"text\":\"doyā\",\"trans\":\"misericordia\",\"sep\":\" \"},{\"text\":\"aichana\",\"trans\":\"obtener\",\"sep\":\" \"},{\"text\":\"parama\",\"trans\":\"supremo\",\"sep\":\" \"},{\"text\":\"udārā\",\"trans\":\"generosidad\",\"sep\":\"\"}],[{\"text\":\"atiśoya\",\"trans\":\"grandioso\",\"sep\":\" \"},{\"text\":\"manda\",\"trans\":\"tonto\",\"sep\":\" \"},{\"text\":\"nātha\",\"trans\":\"señor\",\"sep\":\"! \"},{\"text\":\"bhāga\",\"trans\":\"fortuna\",\"sep\":\" \"},{\"text\":\"hāmārā\",\"trans\":\"de mí\",\"sep\":\"\"}]]},{\"number\":\"5\",\"text\":[\"nāhi janamalo nāme anurāga mora\",\"bhaktivinoda-chitta duḥkhe bibhora\"],\"word_by_word\":[\"**nāhi** — no; **janamalo** — esplendidamente manifiesto; **nāme** — del nombre; **anurāga** — amor; **mora** — mío; **bhaktivinoda-chitta** — el corazón de Bhakti Vinod; **duḥkhe** — con tristeza; **bibhora** — sobrepasar.\"],\"translation\":[\"Nunca he sentido atracción alguna hacia los Santos Nombres. Por lo tanto, el corazón de Bhakti Vinod está lleno de tristeza.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"nāhi\",\"trans\":\"no\",\"sep\":\" \"},{\"text\":\"janamalo\",\"trans\":\"esplendidamente manifiesto\",\"sep\":\" \"},{\"text\":\"nāme\",\"trans\":\"del nombre\",\"sep\":\" \"},{\"text\":\"anurāga\",\"trans\":\"amor\",\"sep\":\" \"},{\"text\":\"mora\",\"trans\":\"mío\",\"sep\":\"\"}],[{\"text\":\"bhaktivinoda-chitta\",\"trans\":\"el corazón de Bhakti Vinod\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"duḥkhe\",\"trans\":\"con tristeza\",\"sep\":\" \"},{\"text\":\"bibhora\",\"trans\":\"sobrepasar\",\"sep\":\"\"}]]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Bhakti Lalita Devi\",\"ru\":\"Бхакти Лалита Деви\",\"ua\":\"Бгакті Лаліта Деві\"},\"embed_url\":\"https://soundcloud.com/bhakti-lalita-devi/tuhu-doya-sagara-tarayite-prani\"},{\"title\":{\"en\":\"Srila B.N. Acharya Maharaj\",\"ru\":\"Шрила Б.Н. Ачарья Махарадж\",\"ua\":\"Шріла Б.Н. Ачарʼя Махарадж\"},\"embed_url\":\"https://soundcloud.com/kostya-netrebenko/101-srisrisiksastakam2-1\"}]},\"hasWbw\":true,\"hasVersesText\":true,\"hasVersesTranslations\":true,\"fullInlineWbw\":false}}]\n"])</script><script>self.__next_f.push([1,"3f:[\"$\",\"$L48\",null,{\"audio\":\"$3e:props:song:resources:audio\",\"language\":\"es\"}]\n40:[\"$\",\"$L49\",null,{\"navMap\":{\"219\":{\"p
