ī,\",\"        yatane pālana kari\",\"kṛṣṇa-vasati,        vasati bali’,\",\"        parama ādare bari\"],\"word_by_word\":[\"**mādhava-tithi** — días sagrados que están especialmente relacionados con Hari, tales como Śrī Harivāsar (*Ekādaśī*), el día de la aparición de Kṛṣṇa, etc; **bhakti** — de la devoción; **jananī** — la madre; **yatane** — con cuidado; **pālana** — observar; **kari** — hago; **kṛṣṇa** — de Kṛṣṇa; **vasati** — (*śrī dhāma*) — morada sagrada; **vasati** — mi lugar de residencia; **bali’** — considerando; **parama** — gran; **ādare** — con adoración; **bari** — (*varaṇa kari*) — elijo, acepto.\"],\"translation\":[\"Observo cuidadosamente los días santos relacionados con Mādhava; son la madre de la devoción. Con gran adoración, abrazo la morada de Kṛṣṇa como mía.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"mādhava-tithi\",\"trans\":\"días sagrados que están especialmente relacionados con Hari, tales como Śrī Harivāsar (*Ekādaśī*), el día de la aparición de Kṛṣṇa, etc\",\"sep\":\",        \",\"error\":\"multi\"},{\"text\":\"bhakti\",\"trans\":\"de la devoción\",\"sep\":\"-\"},{\"text\":\"jananī\",\"trans\":\"la madre\",\"sep\":\",\"}],[{\"text\":\"yatane\",\"trans\":\"con cuidado\",\"sep\":\" \"},{\"text\":\"pālana\",\"trans\":\"observar\",\"sep\":\" \"},{\"text\":\"kari\",\"trans\":\"hago\",\"sep\":\"\"}],[{\"text\":\"kṛṣṇa\",\"trans\":\"de Kṛṣṇa\",\"sep\":\"-\"},{\"text\":\"vasati\",\"trans\":\"(*śrī dhāma*) — morada sagrada\",\"sep\":\",        \"},{\"text\":\"vasati\",\"trans\":\"mi lugar de residencia\",\"sep\":\" \"},{\"text\":\"bali\",\"trans\":\"considerando\",\"sep\":\"’,\"}],[{\"text\":\"parama\",\"trans\":\"gran\",\"sep\":\" \"},{\"text\":\"ādare\",\"trans\":\"con adoración\",\"sep\":\" \"},{\"text\":\"bari\",\"trans\":\"(*varaṇa kari*) — elijo, acepto\",\"sep\":\"\"}]]},{\"number\":\"3\",\"text\":[\"gaura āmāra,        ye saba sthāne,\",\"        karala bhramaṇa raṅge\",\"se saba sthāna,        heriba āmi ** — haciendo; **haya** — ocurre; **sakala** — todo; **prapañcha** — (*pañcha-bhūta nirmita jagat*) — el universo hecho de los cinco elementos materiales; **jaya** — conquista.\"],\"translation\":[\"Contemplando las formas de la Deidad de la Pareja Divina, siento una gran alegría. Al honrar *prasādam*, supero la creación material entera.\"],\"isWbwInlineModeAvailable\":true,\"inline_word_by_word\":[[{\"text\":\"yugala\",\"trans\":\"de la Divina Pareja\",\"sep\":\"-\"},{\"text\":\"mūrti\",\"trans\":\"la forma de la Deidad\",\"sep\":\",        \"},{\"text\":\"dekhiyā\",\"trans\":\"contemplar\",\"sep\":\" \"},{\"text\":\"mora\",\"trans\":\"mi\",\"sep\":\",\"}],[{\"text\":\"parama\",\"trans\":\"gran\",\"sep\":\"-\"},{\"text\":\"ānanda\",\"trans\":\"alegría\",\"sep\":\" \"},{\"text\":\"haya\",\"trans\":\"ocurre\",\"sep\":\"\"}],[{\"text\":\"prasāda\",\"trans\":\"de los remanentes de la comida ofrecida\",\"sep\":\"-\"},{\"text\":\"sevā\",\"trans\":\"servicio\",\"sep\":\"        \"},{\"text\":\"karite\",\"trans\":\"haciendo\",\"sep\":\" \"},{\"text\":\"haya\",\"trans\":\"ocurre\",\"sep\":\",\"}],[{\"text\":\"sakala\",\"trans\":\"todo\",\"sep\":\" \"},{\"text\":\"prapañcha\",\"trans\":\"(*pañcha-bhūta nirmita jagat*) — el universo hecho de los cinco elementos materiales\",\"sep\":\" \"},{\"text\":\"jaya\",\"trans\":\"conquista\",\"sep\":\"\"}]]},{\"number\":\"6\",\"text\":[\"ye dina gṛhe,        bhajana dekhi,\",\"        gṛhete goloka bhāya\",\"charaṇa-sīdhu,        dekhiyā gaṅgā,\",\"        sukha nā sīmā pāya\"],\"word_by_word\":[\"**ye** — el cual; **dina** — días; **gṛhe** — en casa; **bhajana** — servicio devocional; **dekhi** — veo; **gṛhete** — en el hogar; **goloka** — la morada espiritual de Kṛṣṇa; **bhāya** — (*anubhūta haya*) — es experimentada; **charaṇa-sīdhu** — (*śrī-charaṇāmṛta*) — el néctar de los pies del Señor; **dekhiyā** — viendo; **gaṅgā** — el río Ganges; **sukha** — felicidad; **nā** — no; **sīmā** — limite; **pāya** — obtener.\"],\"translation\":[\
