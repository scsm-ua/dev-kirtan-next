t\":\"lobho\",\"trans\":\"logro\",\"sep\":\" \"},{\"text\":\"adhikāra\",\"trans\":\"cualificación\",\"sep\":\"\"}]]},{\"number\":\"2\",\"text\":[\"ṭṛṇādhika hīna, dīna, akiñchana chāra\",\"āpane mānobi sadā chāḍi’ ahaṅkāra\"],\"word_by_word\":[\"**ṭṛṇa** — una brizna de hierba; **ādhika** — aun más; **hīna** — insignificante; **dīna** — caído; **akiñchana** — sin nada; **chāra** — cenizas; **āpane** — propio; **mānobi** — pensarás; **sadā** — siempre; **chāḍi’** — renunciar; **ahaṅkāra** — falso ego.\"],\"translation\":[\"Más humilde que una brizna de hierba, considerándote bajo, pobre y despreciable, abandona tu ego falso.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"ṭṛṇādhika\",\"trans\":\"una brizna de hierba\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"hīna\",\"trans\":\"aun más\",\"sep\":\", \",\"error\":\"mismatch\"},{\"text\":\"dīna\",\"trans\":\"insignificante\",\"sep\":\", \",\"error\":\"mismatch\"},{\"text\":\"akiñchana\",\"trans\":\"caído\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"chāra\",\"trans\":\"sin nada\",\"sep\":\"\",\"error\":\"mismatch\"}],[{\"text\":\"āpane\",\"trans\":\"cenizas\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"mānobi\",\"trans\":\"propio\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"sadā\",\"trans\":\"pensarás\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"chāḍi\",\"trans\":\"siempre\",\"sep\":\"’ \",\"error\":\"mismatch\"},{\"text\":\"ahaṅkāra\",\"trans\":\"renunciar\",\"sep\":\"\",\"error\":\"mismatch\"}]]},{\"number\":\"3\",\"text\":[\"vṛkṣa-sama kṣamā-guṇa korobi sādhana\",\"pratihiṁsā tyaji anye korobi pālana\"],\"word_by_word\":[\"**vṛkṣa** — el árbol; **sama** — tal como; **kṣamā** — tolerancia; **guṇa** — virtud; **korobi** — hacer; **sādhana** — práctica; **pratihiṁsā** — violencia; **tyaji** — renunciar; **anye** — a otros; **korobi** — hacer; **pālana** — protección.\"],\"translation\":[\"Tolerante como un árbol, debes perdonar y soportar con paciencia, abandonando la violencia. Practica el nutrir y proteger a los demás.\"],\"isWbwInlineModeAvailable\":true,\"inline_word_by_word\":[[{\"text\":\"vṛkṣa\",\"trans\":\"el árbol\",\"sep\":\"-\"},{\"text\":\"sama\",\"trans\":\"tal como\",\"sep\":\" \"},{\"text\":\"kṣamā\",\"trans\":\"tolerancia\",\"sep\":\"-\"},{\"text\":\"guṇa\",\"trans\":\"virtud\",\"sep\":\" \"},{\"text\":\"korobi\",\"trans\":\"hacer\",\"sep\":\" \"},{\"text\":\"sādhana\",\"trans\":\"práctica\",\"sep\":\"\"}],[{\"text\":\"pratihiṁsā\",\"trans\":\"violencia\",\"sep\":\" \"},{\"text\":\"tyaji\",\"trans\":\"renunciar\",\"sep\":\" \"},{\"text\":\"anye\",\"trans\":\"a otros\",\"sep\":\" \"},{\"text\":\"korobi\",\"trans\":\"hacer\",\"sep\":\" \"},{\"text\":\"pālana\",\"trans\":\"protección\",\"sep\":\"\"}]]},{\"number\":\"4\",\"text\":[\"jīvana-nirvāhe āne udvega nā dibe\",\"para-upakāre nija-sukha pāsaribe\"],\"word_by_word\":[\"**jīvana** — la vida; **nirvāhe** — en el curso; **āne** — a otros; **udvega** — angustia; **nā dibe** — no darás; **para-upakāre** — ayudar a otros; **nija-sukha** — propia felicidad; **pāsaribe** — olvidarás.\"],\"translation\":[\"Vive sin producirles ansiedad a los demás y hazles el bien sin considerar tu propia felicidad.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"jīvana\",\"trans\":\"la vida\",\"sep\":\"-\"},{\"text\":\"nirvāhe\",\"trans\":\"en el curso\",\"sep\":\" \"},{\"text\":\"āne\",\"trans\":\"a otros\",\"sep\":\" \"},{\"text\":\"udvega\",\"trans\":\"angustia\",\"sep\":\" \"},{\"text\":\"nā dibe\",\"trans\":\"no darás\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"para-upakāre\",\"trans\":\"ayudar a otros\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"nija-sukha\",\"trans\":\"propia felicidad\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"pāsaribe\",\"trans\":\"olvidarás\",\"sep\":\"\"}]]},{\"number\":\"5\",\"text\":[\"hoile-o sarvva-guṇe guṇī mahāśoya\",\"pratiṣṭhāśā chāḍi koro amānī hṛdoya\"],\"word_by_word\":[\"**hoile-o** — eso es;
