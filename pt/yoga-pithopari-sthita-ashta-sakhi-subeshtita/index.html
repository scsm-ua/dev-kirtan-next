anslation\":[\"Às vezes, Eles misericordiosamente seguram minhas mãos e me dizem palavras doces. Eles aceitam pān de mim, o mastigam, e avidamente vestem guirlandas que eu preparei.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"kabhu\",\"trans\":\"Às vezes\",\"sep\":\" \"},{\"text\":\"kṛpā kari\",\"trans\":\"Eles misericordiosamente\",\"sep\":\"’ \",\"error\":\"multi\"},{\"text\":\"mama\",\"trans\":\"seguram\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"hasta\",\"trans\":\"minhas\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"dhari\",\"trans\":\"mãos [e]\",\"sep\":\"’\",\"error\":\"mismatch\"}],[{\"text\":\"madhura\",\"trans\":\"falam\",\"sep\":\"-\",\"error\":\"mismatch\"},{\"text\":\"vachana\",\"trans\":\"doces\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"bale\",\"trans\":\"palavras [a mim]\",\"sep\":\"\",\"error\":\"mismatch\"}],[{\"text\":\"tāmbula la\",\"trans\":\"Eles\",\"sep\":\"-\",\"error\":\"mismatch\"},{\"text\":\"iyā khāya\",\"trans\":\"aceitam\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"dui\",\"trans\":\"pān\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"jane\",\"trans\":\"mastigam [no], [e]\",\"sep\":\"\",\"error\":\"mismatch\"}],[{\"text\":\"mālā\",\"trans\":\"avidamente\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"laya\",\"trans\":\"aceitam\",\"sep\":\" \"},{\"text\":\"kutūhale\",\"trans\":\"guirlandas\",\"sep\":\"\",\"error\":\"mismatch\"}]]},{\"number\":\"4\",\"text\":[\"adarśana haya kakhana ki chhale\",\"nā dekhiyā do̐he hiyā mora jvale\"],\"word_by_word\":[\"**kakhana**–Às vezes **adarśana haya**–Eles desaparecem [por] **ki**–algum **chhale**–estratagema. **nā**–Não **dekhiyā**–vendo **do̐he**–Eles **mora**–meu **hiyā**–coração **jvale**–queima.\"],\"translation\":[\"Às vezes, eles desaparecem por algum estratagema. Não os vendo, meu coração queima.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"adarśana\",\"trans\":\"Às vezes\",\"sep\":\" \",\"error
