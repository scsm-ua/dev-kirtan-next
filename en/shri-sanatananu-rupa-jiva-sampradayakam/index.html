ces and spontaneous devotion. Lord GaurДЃб№…ga also lovingly revealed His worshipable personality to the servitors of ЕљrД« JagannДЃth Deva at NД«lДЃchala (ЕљrД« PurД«-dhДЃm). I offer my obeisances to that beautiful Golden Lord, GaurДЃб№…ga Sundar, the divine form of Krishna-*prema*.\"]},{\"number\":\"52\",\"text\":[\"tyДЃga-bДЃhya-bhoga-buddhi-tД«vra-daб№‡бёЌa-nindanaб№Ѓ\",\"rДЃya-Е›uddha-kб№›б№Јб№‡a-kДЃma-sevanДЃbhi-nandanam\",\"rДЃya-rДЃga-sevanokta-bhДЃgya-koб№­i-duб№Јkaraб№Ѓ\",\"prema-dhДЃma-devam eva naumi gaura-sundaram\"],\"translation\":[\"Lord Gaurasundar strongly condemned those who externally accepted the dress of a renunciate yet, like monkeys, actually harbored desires for sense pleasures. On the other hand, He honoured that great devotee RДЃmДЃnanda RДЃyaвЂ™s devotional efforts to intimately teach some young girls a form of dance drama for the pleasure of Lord JagannДЃth. Considering RДЃmДЃnandaвЂ™s service to be on the platform of spontaneous devotion, the Lord proclaimed that such a level of service was a great fortune attainable only after millions of births. I offer my obeisances to that beautiful Golden Lord, GaurДЃб№…ga Sundar, the divine form of Krishna-*prema*.\"]},{\"number\":\"53\",\"text\":[\"Е›rД«-prayДЃga-bhaб№­б№­a-vallabhaika-niб№Јб№­ha-sevanaб№Ѓ\",\"nД«la-Е›aila-bhaб№­б№­a-datta-rДЃga-mДЃrga-rДЃdhanam\",\"Е›rД« gadДЃdharДЃrpitДЃdhikДЃra-mantra-mДЃdhuraб№Ѓ\",\"prema-dhДЃma-devam eva naumi gaura-sundaram\"],\"translation\":[\"The famous spiritual preceptor of the Viб№Јб№‡uswДЃmД« disciplic succession *Е›uddhДЃdvaita*, ЕљrД« Vallabha Bhaб№­б№­a, lived in the village of ДЂбёЌhДЃila in sacred PrayДЃga, and personally served Lord GaurДЃб№…gadev with resolute devotion in his residence. Later in JagannДЃth PurД«, Lord GaurДЃб№…ga allowed Vallabha Bhaб№­б№­a to enter into and relish the sweet taste experienced in parental attachment to baby Krishna. The Lord also arranged for him to learn the appropriate mantras for his worship from ЕљrД« GadДЃdhara Paб№‡бёЌД«t. I offer my obeisances to that beautiful Golden Lord, GaurДЃб№…ga Sundar, the divine form of Krishna-*prema*.\"]},{\"number\":\"54\",\"text\":[\"Е›rД«-svarЕ«pa-rДЃya-saб№…ga-gДЃmbhirДЃntya-lД«lanaб№Ѓ\",\"dvДЃdaЕ›ДЃbda-vahni-garbha-vipralambha-Е›Д«lanam\",\"rДЃdhikДЃdhirЕ«бёЌha-bhДЃva-kДЃnti-kб№›б№Јб№‡a-kuГ±jaraб№Ѓ\",\"prema-dhДЃma-devam eva naumi gaura-sundaram\"],\"translation\":[\"Diving deep into the reality of His own beauty and sweetness, Lord Govinda stole the mood of RДЃdhДЃrДЃб№‡Д« and, garbing Himself in Her brilliant lustre, appeared as ЕљrД« Chaitanya MahДЃprabhu. For the last twelve years of His manifest Pastimes He was deeply absorbed in union and separation, and He shared His heartвЂ™s inner feelings with His most confidential devotees such as SwarЕ«p DДЃmodar and RДЃmДЃnanda RДЃya: *bДЃhire viб№ЈajvДЃlДЃ hoy, antare ДЃnandamoy*.\",\"вЂњThe wonderful characteristic of divine love of Krishna is that although externally it works like fiery lava, internally it is like sweet nectar that fills the heart with the greatest joy.вЂќ Volcanic eruptions of ecstasy flowed from the heart of ЕљrД« GaurДЃб№…ga in the agony of separation from Krishna. This Golden Lord, who appeared like an intoxicated elephant, is none other than Lord Govinda. I offer my obeisances to that beautiful Golden Lord, GaurДЃб№…ga Sundar, the divine form of Krishna-*prema*.\"]},{\"number\":\"55\",\"text\":[\"Е›rД«-svarЕ«pa-kaб№‡б№­ha-lagna-mДЃthura-pralДЃpakaб№Ѓ\",\"rДЃdhikДЃnu-vedanДЃrta-tД«vra-vipralambhakam\",\"svapnavat-samДЃdhi-dб№›б№Јб№­a-divya-varб№‡anДЃturaб№Ѓ\",\"prema-dhДЃma-devam eva naumi gaura-sundaram\"],\"translation\":[\"ЕљrД« GaurДЃб№…gadev, embracing the neck of ЕљrД« SwarЕ«p DДЃmodar, began to sorrowfully recite the prayers ЕљrД«matД« RДЃdhДЃrДЃб№‡Д« had previously spoken in the agony of separation when Lord Krishna left VrindДЃvan for MathurДЃ. The Lord would continuously taste the mood of ЕљrД«matД« RДЃdhДЃrДЃб№‡Д«, who was experiencing untold agony from the burning fire of Her tragic separation from Lord Krishna. With a heavy heart, the Lord would describe what He was directly realising in divine trance. Those realisations are just like dreams to ordinary men. I offer my obeisances to that beautiful Golden Lord, GaurДЃб№…ga Sundar, the divine form of Krishna-*prema*.\"]},{\"number\":\"56\",\"text\":[\"sДЃtvikДЃdi-bhДЃva-chihna-deha-divya-sauб№Јб№­havaб№Ѓ\",\"kЕ«rma-dharma-bhinna-sandhi-gДЃtra-puб№Јpa-pelavam\",\"hrasva-dД«rgha-padma-gandha-rakta-pД«ta-pДЃб№‡бёЌuraб№Ѓ\",\"prema-dhДЃma-devam eva naumi gaura-sundaram\"],\"translation\":[\"The eightfold symptoms depicting the moods of pure dedication would decorate and radiantly enhance the beauty of the LordвЂ™s bodily parts. Sometimes He appeared like a tortoise who had withdrawn his limbs into his shell, and at other times His body appeared elongated due to His joints becoming dislocated. Sometimes Lord GaurasundarвЂ™s figure was as tender and aromatic as a lotus flower. At other times the LordвЂ™s body would appear red, yellow, or brilliant with the white hue of the jasmine flower. I offer my obeisances to that beautiful Golden Lord, GaurДЃб№…ga Sundar, the divine form of Krishna-*prema*.\"]},{\"number\":\"57\",\"text\":[\"tД«vra-vipralambha-mugdha-mandirДЃgra-dhДЃvitaб№Ѓ\",\"kЕ«rma-rЕ«pa-divya-gandha-lubdha-dhenu-veб№Јб№­itam\",\"varб№‡itДЃli-kЕ«la-kб№›б№Јб№‡a-keli-Е›aila-kandaraб№Ѓ\",\"prema-dhДЃma-devam eva naumi gaura-sundaram\"],\"translation\":[\"Grief-stricken and overwhelmed with tragic feelings of separation, Lord Chaitanya quickly ran to the lion-gate of Lord JagannДЃthвЂ™s grand temple. Moments later, the Lord fell to the ground. In deep separation He manifested the form of the tortoise incarnation KЕ«rmadeva, and an extraordinarily sweet fragrance began to emanate from the LordвЂ™s unconscious figure. This attracted the *telДЃб№…gД«* cows who resided at Lord JagannДЃthвЂ™s Temple, and they surrounded the Lord. I offer my obeisances to that beautiful Golden Lord, GaurДЃб№…ga Sundar, the divine form of Krishna-*prema*.\"]},{\"number\":\"58\",\"text\":[\"indu-sindhu-nб№›tya-dД«pta-kб№›б№Јб№‡a-keli-mohitaб№Ѓ\",\"Е«rmi-Е›Д«rб№Јa-supta-deha-vДЃta-raб№…ga-vДЃhitam\",\"yДЃmunДЃli-kб№›б№Јб№‡a-keli-magna-saukhya-sДЃgaraб№Ѓ\",\"prema-dhДЃma-devam eva naumi gaura-sundaram\"],\"translation\":[\"Once on a moonlit night, Lord GaurДЃб№…ga-deva, relishing the sweet mellows of Lord KrishnaвЂ™s Pastimes, was wandering along the oceanвЂ™s shore with His associates. Suddenly the Lord saw the reflection of the moon dancing upon the rolling waves. Unexpectedly, the Lord became overwhelmed by recollections of Lord KrishnaвЂ™s Pastimes in the YamunДЃ River and fell unconscious. Next, Lord GaurДЃб№…gaвЂ™s body, unseen by the devotees, became as light as a piece of dried wood and was gracefully carried away by the wind-god while lying upon the crest of the oceanвЂ™s rolling waves in a divine trance. Realizing Lord KrishnaвЂ™s water-sport Pastimes in the KДЃlindД« River with His dearmost cowherd-maiden friends, the Lord dove deep into an ocean of divine ecstasy. I offer my obeisances to that beautiful Golden Lord, GaurДЃб№…ga Sundar, the divine form of Krishna-*prema*.\"]},{\"number\":\"59\",\"text\":[\"rДЃtri-Е›eб№Јa-saumya-veЕ›a-Е›ДЃyitДЃrdra-saikataб№Ѓ\",\"bhinna-sandhi-dД«rgha-deha-pelavДЃti-daivatam\",\"Е›rДЃnta-bhakta-chakratД«rtha-hб№›б№Јб№­a-dб№›б№Јб№­i-gocharaб№Ѓ\",\"prema-dhДЃma-devam eva naumi gaura-sundaram\"],\"translation\":[\"After searching for the Lord throughout the night, the exhausted devotees finally found Him at nightвЂ™s end near ChakratД«rtha, His elongated form lying upon the moist sand. The devoteesвЂ™ eyes were filled with joy as they glanced upon the delicate and serene figure of their Lord. I offer my obeisances to that beautiful Golden Lord, GaurДЃб№…ga Sundar, the divine form of Krishna-*prema*.\"]},{\"number\":\"60\",\"text\":[\"ДЃrta-bhakta-kaб№‡б№­ha-kб№›б№Јб№‡a-nДЃma-karб№‡a-hб№›dgataб№Ѓ\",\"lagna-sandhi-
