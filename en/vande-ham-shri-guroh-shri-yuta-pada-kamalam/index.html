 translation\",\"song\":{\"meta\":{\"page\":9,\"author\":\"Śrīla Kṛṣṇadās Kavirāj Goswāmī\",\"first_line\":\"vande ’haṁ śrī-guroḥ śrī-yuta-pada-kamalaṁ\"},\"title\":[\"Vandanā\"],\"verses\":[{\"text\":[\"vande ’haṁ śrī-guroḥ śrī-yuta-pada-kamalaṁ\",\"    śrī-gurūn vaiṣṇavāṁś cha\",\"śrī-rūpaṁ sāgrajātaṁ saha-gaṇa-\",\"    raghunāthānvitaṁ taṁ sa-jīvam\",\"sādvaitaṁ sāvadhūtaṁ parijana-sahitaṁ\",\"    kṛṣṇa-chaitanya-devaṁ\",\"śrī-rādhā-kṛṣṇa-pādān saha-gaṇa-lalitā-śrī-\",\"    viśākhānvitāṁś cha\"],\"word_by_word\":[\"**vande** — bow; **haṁ** — I; **śrī** — revered; **guroḥ** — teacher's; **śrī** — glory; **yuta** — adorned; **pada** — feet; **kamalaṁ** — lotuses; **śrī** — revered; **gurūn** — teachers; **vaiṣṇavāṁś** — Vaiṣṇavas; **cha** — and; **śrī** — Śrī; **rūpaṁ** — Rūpa (Goswāmī); **sāgrajātaṁ** — with elder brother (Sanātana Goswāmī); **saha** — together with; **gaṇa** — associates; **raghunāthānvitaṁ** — with Raghunātha (Goswāmī); **taṁ** — him; **sa** — with; **jīvam** — Jīva (Goswāmī); **sādvaitaṁ** — with Advaita (Āchārya); **sāvadhūtaṁ** — with Avadhūta (Nityānanda); **parijana** — associates; **sahitaṁ** — accompanying; **kṛṣṇa** — Kṛṣṇa; **chaitanya** — Chaitanya (Mahāprabhu); **devaṁ** — Lord; **śrī** — Śrī; **rādhā** — Rādhā's; **kṛṣṇa** — Kṛṣṇa's; **pādān** — feet; **saha** — together with; **gaṇa** — associates; **lalitā** — Lalitā; **śrī** — (with) Śrī; **viśākhānvitāṁś** — Viśākhā; **cha** — also.\"],\"translation\":[\"Śrīla Krishnadās Kavirāj prays, “First I offer my respects unto the lotus feet of my initiating spiritual masters and the recruiting spiritual masters and advanced Vaiṣṇavas. Next I offer my obeisances to my śāstra gurus, Śrīla Rūpa Goswāmī, his elder brother, Śrīla Sanātan Goswāmī, Śrīla Raghunāth Dās Goswāmī, and Śrīla Jīva Goswāmī. On a higher platform I offer my respects unto Śrī Chaitanya Mahāprabhu, who came with His paraphernalia and associates, along with those great personalities Śrī Nityānanda Prabhu and Śrī Advaita Āchārya. And in the highest stage, I offer my obeisances unto the lotus feet of Śrī Śrī Rādhā and Govinda, and all of the gopīs, headed by Lalitā devī and Viśākhā devī.”\"],\"isWbwInlineModeAvailable\":true,\"inline_word_by_word\":[[{\"text\":\"vande\",\"trans\":\"bow\",\"sep\":\" \"},{\"text\":\"’haṁ\",\"trans\":\"I\",\"sep\":\" \"},{\"text\":\"śrī\",\"trans\":\"revered\",\"sep\":\"-\"},{\"text\":\"guroḥ\",\"trans\":\"teacher's\",\"sep\":\" \"},{\"text\":\"śrī\",\"trans\":\"glory\",\"sep\":\"-\"},{\"text\":\"yuta\",\"trans\":\"adorned\",\"sep\":\"-\"},{\"text\":\"pada\",\"trans\":\"feet\",\"sep\":\"-\"},{\"text\":\"kamalaṁ\",\"trans\":\"lotuses\",\"sep\":\"\"}],[{\"text\":\"śrī\",\"trans\":\"revered\",\"sep\":\"-\"},{\"text\":\"gurūn\",\"trans\":\"teachers\",\"sep\":\" \"},{\"text\":\"vaiṣṇavāṁś\",\"trans\":\"Vaiṣṇavas\",\"sep\":\" \"},{\"text\":\"cha\",\"trans\":\"and\",\"sep\":\"\"}],[{\"text\":\"śrī\",\"trans\":\"Śrī\",\"sep\":\"-\"},{\"text\":\"rūpaṁ\",\"trans\":\"Rūpa (Goswāmī)\",\"sep\":\" \"},{\"text\":\"sāgrajātaṁ\",\"trans\":\"with elder brother (Sanātana Goswāmī)\",\"sep\":\" \"},{\"text\":\"saha\",\"trans\":\"together with\",\"sep\":\"-\"},{\"text\":\"gaṇa\",\"trans\":\"associates\",\"sep\":\"-\"}],[{\"text\":\"raghunāthānvitaṁ\",\"trans\":\"with Raghunātha (Goswāmī)\",\"sep\":\" \"},{\"text\":\"taṁ\",\"trans\":\"him\",\"sep\":\" \"},{\"text\":\"sa\",\"trans\":\"with\",\"sep\":\"-\"},{\"text\":\"jīvam\",\"trans\":\"Jīva (Goswāmī)\",\"sep\":\"\"}],[{\"text\":\"sādvaitaṁ\",\"trans\":\"with Advaita (Āchārya)\",\"sep\":\" \"},{\"text\":\"sāvadhūtaṁ\",\"trans\":\"with Avadhūta (Nityānanda)\",\"sep\":\" \"},{\"text\":\"parijana\",\"trans\":\"associates\",\"sep\":\"-\"},{\"text\":\"sahitaṁ\",\"trans\":\"accompanying\",\"sep\":\"\"}],[{\"text\":\"kṛṣṇa\",\"trans\":\"Kṛṣṇa\",\"sep\":\"-\"},{\"text\":\"chaitanya\",\"trans\":\"Chaitanya (Mahāprabhu)\",\"sep\":\"-\"},{\"text\":\"devaṁ\",\"trans\":\"Lord\",\"sep\":\"\"}],[{\"text\":\"śrī\",\"trans\":\"Śrī\",\"sep\":\"-\
