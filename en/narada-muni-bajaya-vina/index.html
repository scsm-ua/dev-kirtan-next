ākur\"}]}]\n"])</script><script>self.__next_f.push([1,"3e:[\"$\",\"$L46\",null,{\"bookId\":\"en\",\"label\":\"Show verses / translation\",\"song\":{\"meta\":{\"page\":160,\"first_line\":\"nārada muni, bājāya vīṇā\",\"author\":\"Śrīla Bhakti Vinod Ṭhākur\"},\"title\":[\"Śrī Nāmāṣṭakam 8\"],\"author\":[\"by Śrīla Bhakti Vinod Ṭhākur\"],\"verses\":[{\"number\":\"1\",\"text\":[\"nārada muni,    bājāya vīṇā,\",\"    ‘rādhikā-ramaṇa’-nāme\",\"nāma amani,    udita hoya,\",\"    bhakata-gīta-sāme\"],\"translation\":[\"When the great soul Nārada Muni plays his stringed vīṇā, the Holy Name of Rādhikā-Ramaṇa descends and immediately appears amidst the kīrtan of the Lord’s devotees.\"]},{\"number\":\"2\",\"text\":[\"amiya-dhārā,    bariṣe ghana,\",\"    śravana-jugale giyā\",\"bhakata-jana,    saghane nāche,\",\"    bhoriyā āpana hiyā\"],\"translation\":[\"Like a monsoon cloud, the Holy Name showers pure nectar into their ears. All the devotees, due to great ecstasy, enthusiastically dance to their heart’s content.\"]},{\"number\":\"3\",\"text\":[\"mādhurī-pūra,    āsabo paśi’,\",\"    mātāya jagata-jane\",\"keho vā kā̐de,    keho vā nāche,\",\"    keho māte mane mane\"],\"translation\":[\"All the inhabitants of the universe become maddened upon entering these intoxicating showers of divine sweetness. Some people cry, some dance and others become fully intoxicated within their minds.\"]},{\"number\":\"4\",\"text\":[\"pañcha-vadana,    nārade dhori’,\",\"    premera saghana rol\",\"kamalāsana,    nāchiyā bole,\",\"    ‘bolo bolo hari bolo’\"],\"translation\":[\"The five-faced Lord Shiva embraces Nārada Muni and repeatedly makes loud screams of ecstatic joy, while Lord Brahmā dances very ecstatically and exclaims, “All of you chant ‘Haribol ! Haribol!’”\"]},{\"number\":\"5\",\"text\":[\"sahasrānana,    parama-sukhe,\",\"    ‘hari hari’ boli gāy\",\"nāma-prabhāve,    mātilo viśva,\",\"    nāma-rasa sabe pāy\"],\"translation\":[\"In supreme happiness the thousand-faced Ananta Śeṣa sings and calls out, “Hari! Hari!” By the influence of the transcendental vibration of that Name, the whole universe becomes ecstatically maddened as everyone tastes and relishes the mellows of the holy name.\"]},{\"number\":\"6\",\"text\":[\"śrī-kṛṣṇa-nāma,    rasane sphuri’,\",\"    pūrā’o āmāra āśa\",\"śrī-rūpa-pade,    jāchaye ihā,\",\"    bhakativinoda-dāsa\"],\"translation\":[\"The Holy Name of Śrī Krishna has fulfilled all my desires by thus manifesting on everyone’s tongue. Bhakti Vinod, the humble servant of the Lord, therefore prays at the feet of Śrī Rūpa Goswāmī that the chanting of Harinām may always continue in this way.\"]}],\"embeds\":[{\"title\":\"Bhakti Lalita Devi\",\"embed_url\":\"https://soundcloud.com/bhakti-lalita-devi/bhakti-lalita-devi-namastakam-song-8-narada-muni-bajaya-vina\",\"iframe_url\":\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbhakti-lalita-devi%2Fbhakti-lalita-devi-namastakam-song-8-narada-muni-bajaya-vina\",\"embed_code\":\"\u003ciframe width=\\\"100%\\\" height=\\\"20\\\" scrolling=\\\"no\\\" frameborder=\\\"no\\\" allow=\\\"autoplay\\\" src=\\\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbhakti-lalita-devi%2Fbhakti-lalita-devi-namastakam-song-8-narada-muni-bajaya-vina\\\"\u003e\u003c/iframe\u003e\"}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Bhakti Lalita Devi\",\"ru\":\"Бхакти Лалита Деви\",\"ua\":\"Бгакті Лаліта Деві\"},\"embed_url\":\"https://soundcloud.com/bhakti-lalita-devi/bhakti-lalita-devi-namastakam-song-8-narada-muni-bajaya-vina\"}]},\"hasWbw\":false,\"hasVersesText\":true,\"hasVersesTranslations\":true,\"fullInlineWbw\":false}}]\n"])</script><script>self.__next_f.push([1,"3f:[\"$\",\"$L47\",null,{\"audio\":\"$3e:props:song:resources:audio\",\"language\":\"en\"}]\n40:[\"$\",\"$L48\",null,{\"navMap\":{\"160\":{\"prev\":{\"path\":\"/en/kripa-kara-vaishnava-thakura/\",\"title\":\"Prārthanā Lalasāmayi\"},\"next\":{\"path\":\"/en/krishnotkirtana-gana-nartana-parau/\",\
