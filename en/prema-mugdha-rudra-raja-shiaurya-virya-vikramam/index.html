ion\":[\"When northern India was under Muslim rule, that great kingly emperor of the independent state of Orissa, PratńĀparudra, was completely wonderstruck and overtaken by the magnanimity, prowess, and activities that Lord Chaitanya exhibited in pure love of Godhead. The great King PratńĀparudra rejected all his earlier ties with traditional religiosity and his valiant kingly nature, and he threw himself before the lotus feet of Ňörńę Chaitanyadeva in full surrender. The merciful Lord then bathed the surrendered emperor‚Äôs head with the sacred dust of His tender lotus feet. I offer my obeisances to that beautiful Golden Lord, GaurńĀŠĻÖga Sundar, the divine form of Krishna-*prema*.\"]},{\"number\":\"32\",\"text\":[\"dńĀkŠĻ£iŠĻáńĀtya-suprasiddha-paŠĻáŠłćitaugha-pŇęjitaŠĻĀ\",\"ŇõreŠĻ£ŠĻ≠ha-rńĀja-rńĀjapńĀtra-ŇõńęrŠĻ£a-bhakti-bhŇęŠĻ£itam\",\"deŇõa-mńĀtŠĻõ-ŇõeŠĻ£a-darŇõanńĀrthi-gauŠłća-gocharaŠĻĀ\",\"prema-dhńĀma-devam eva naumi gaura-sundaram\"],\"translation\":[\"The Supreme Lord was adored by the famous scholarly class of men in South India. The greatest princes and their ministers viewed the Lord with deep faith, and treated Him like the crest jewel recipient of their respect. According to the correct principles set forth in the bona fide disciplic succession, the Lord came to West Bengal to see the sacred Ganges. He also came to see His birthplace and His mother Ňöachńę Devńę, as if it were for the last time. I offer my obeisances to that beautiful Golden Lord, GaurńĀŠĻÖga Sundar, the divine form of Krishna-*prema*.\"]},{\"number\":\"33\",\"text\":[\"gaura-garvi-sarva-gauŠłća-gauravńĀrtha-sajjitaŠĻĀ\",\"ŇõńĀstra-Ňõastra-dakŠĻ£a-duŠĻ£ŠĻ≠a-nńĀstikńĀdi-lajjitam\",\"muhyamńĀna-mńĀtŠĻõkńĀdi-deha-jńęva-sa√ĪcharaŠĻĀ\",\"prema-dhńĀma-devam eva naumi gaura-sundaram\"],\"translation\":[\"During His travels, Lord GaurńĀŠĻÖgadev‚Äôs fame flooded the length and breadth of Bengal. Therefore, when He returned to Nabadwńęp five years after accepting *sannyńĀs*, all of Bengal, which was proud of Lord GaurńĀŠĻÖga, became enthusiastic to glorify His extraordinary personality. Even the proud atheistic class of scholars were embarrassed about their vile natures when they observed how the ordinary people in all walks of life had such resolute faith in the Lord. When Mother Ňöachńę and the Lord‚Äôs other family members, who were lifeless due to separation from their Lord, had another glimpse of Ňörńę Chaitanyadeva, their life‚Äôs substance was rejuvenated. I offer my obeisances to that beautiful Golden Lord, GaurńĀŠĻÖga Sundar, the divine form of Krishna-*prema*.\"]},{\"number\":\"34\",\"text\":[\"nyńĀsa-pa√Īcha-varŠĻ£a-pŇęrŠĻáa-janma-bhŇęmi-darŇõanaŠĻĀ\",\"koŠĻ≠i-koŠĻ≠i-loka-lubdha-mugdha-dŠĻõŠĻ£ŠĻ≠i-karŠĻ£aŠĻáam\",\"koŠĻ≠i-kaŠĻáŠĻ≠ha-kŠĻõŠĻ£ŠĻáa-nńĀma-ghoŠĻ£a-bheditńĀmbaraŠĻĀ\",\"prema-dhńĀma-devam eva naumi gaura-sundaram\"],\"translation\":[\"Returning to His birthplace after five long years of *sannyńĀs*, the Supreme Lord was met by millions, young and old alike. Everyone‚Äôs eyes were overwhelmed with eagerness to see the Lord, who was attracting their innermost heart of hearts. The Lord‚Äôs ecstatic presence excited the multitudes to continuously resound the Names of Lord Hari, and they created an uproar that reverberated in every direction, beyond the limits of the sky. I offer my obeisances to that beautiful Golden Lord, GaurńĀŠĻÖga Sundar, the divine form of Krishna-*prema*.\"]},{\"number\":\"35\",\"text\":[\"ńĀrta-bhakta-Ňõoka-ŇõńĀnti-tńĀpi-pńĀpi-pńĀvanaŠĻĀ\",\"lakŠĻ£a-koŠĻ≠i-loka-saŠĻÖga-kŠĻõŠĻ£ŠĻáa-dhńĀma-dhńĀvanam\",\"rńĀma-keli-sńĀgrajńĀta-rŇępa-karŠĻ£aŠĻáńĀdaraŠĻĀ\",\"prema-dhńĀma-devam eva naumi gaura-sundaram\"],\"translation\":[\"Ňörńę GaurńĀŠĻÖgadev eased the anxiety the devotees had experienced due to His long separation and forgave many sinful, offensive, anxiety-ridden souls such as GopńĀl ChńĀpńĀl and others. The Lord then began to run towards VŠĻõndńĀvan along the banks of the Ganges. An ocean of people pursued the Lord up to the capital of Bengal, which at that time was known as RńĀmakeli. At RńĀmakeli, Lord GaurńĀŠĻÖga was attracted by His two eternal associates who appeared to be ministers in the Muslim government. and his elder brother, Ňörńęla SanńĀtan GoswńĀmńę. I offer my obeisances to that beautiful Golden Lord, GaurńĀŠĻÖga Sundar, the divine form of Krishna-*prema*.\"]},{\"number\":\"36\",\"text\":[\"vyńĀghra-vńĀraŠĻáaina-vanya-jantu-kŠĻõŠĻ£ŠĻáa-gńĀyakaŠĻĀ\",\"prema-nŠĻõtya-bhńĀva-matta-jhńĀŠłćakhaŠĻáŠłća-nńĀyakam\",\"durga-vanya-mńĀrga-bhaŠĻ≠ŠĻ≠a-mńĀtra-saŠĻÖga-saukaraŠĻĀ\",\"prema-dhńĀma-devam eva naumi gaura-sundaram\"],\"translation\":[\"Leaving RńĀmakeli, the Lord continued through Bengal towards JagannńĀth Purńę. After leaving Purńę DhńĀm, Lord Chaitanya passed through the JhńĀŠłćakhaŠĻáŠłća forest on His way to VŠĻõndńĀvan. There He inspired the jungle animals such as tigers, deer, and elephants to join in the congregational chanting of Lord Krishna‚Äôs Holy Names. Intoxicated by the sweet Names of the Lord, the animals joyfully danced along with the Lord, who was madly absorbed in the deepest devotional ecstasies. The Supreme Lord experienced profound realizations in solitary worship as He walked down the deep and impenetrable jungle paths of JhńĀŠłćakhaŠĻáŠłća with Balabhadra BhaŠĻ≠ŠĻ≠ńĀchńĀrya. I offer my obeisances to that beautiful Golden Lord, GaurńĀŠĻÖga Sundar, the divine form of Krishna-*prema*.\"]},{\"number\":\"37\",\"text\":[\"gńĀŠĻÖga-yńĀmunńĀdi-bindu-mńĀdhavńĀdi-mńĀnanaŠĻĀ\",\"mńĀthurńĀrta-chitta-yńĀmunńĀgra-bhńĀga-dhńĀvanam\",\"smńĀrita-vrajńĀti-tńęvra-vipralambha-kńĀtaraŠĻĀ\",\"prema-dhńĀma-devam eva naumi gaura-sundaram\"],\"translation\":[\"Lord Gaurasundar showed great honour towards the Deities along the Ganges-bank in KńĀŇõńę, and unto Bindu MńĀdhava at the confluence of the Ganges and the YamunńĀ in PrayńĀga. Following the current of the YamunńĀ, the Lord began to quickly run along her banks in anxious pursuit of a glimpse of the sacred place known as MathurńĀ. As divine thoughts of VŠĻõndńĀvan‚Äôs Pastimes overwhelmed His memory and caused intolerable feelings of separation, Lord Gaurasundar fell unconscious. I offer my obeisances to that beautiful Golden Lord, GaurńĀŠĻÖga Sundar, the divine form of Krishna-*prema*.\"]},{\"number\":\"38\",\"text\":[\"mńĀdhavendra-vipralambha-mńĀthureŠĻ£ŠĻ≠a-mńĀnanaŠĻĀ\",\"prema-dhńĀma-dŠĻõŠĻ£ŠĻ≠akńĀma-pŇęrva-ku√Īja-kńĀnanam\",\"gokulńĀdi-goŠĻ£ŠĻ≠ha-gopa-gopikńĀ-priyaŠĻÖkaraŠĻĀ\",\"prema-dhńĀma-devam eva naumi gaura-sundaram\"],\"translation\":[\"Lord Chaitanya stated that the mood of deep separation that MńĀdhavendra Purńę was able to taste, as depicted in the following beautiful verse first spoken by Ňörńęmatńę RńĀdhńĀrńĀŠĻáńę, is the zenith point and desirable object of pure adoration:\",\"*ayi dńęna-dayńĀrdra nńĀtha he*\\\\\",\"*mathurńĀ-nńĀtha kadńĀvalokyase*\\\\\",\"*hŠĻõdayaŠĻĀ tvad-aloka-kńĀtaraŠĻĀ*\\\\\",\"*dayita bhrńĀmyati kiŠĻĀ karomy aham*\",\"‚ÄúO my Lord! O most gracious master! O master of MathurńĀ! When will I see You again? Because of my not seeing You, my agitated heart has become unsteady. O most beloved one, what shall I do now?‚ÄĚ After the Lord entered into Vraja, the background stage where Pastimes of pure love are enacted, He became overwhelmed to His heart‚Äôs full satisfaction. The Lord was charmed to see the beautiful gardens and forest groves that served as His playground for spiritual Pastimes in a previous era. While visiting the twelve forests of VŠĻõndńĀvan, the Lord exhibited various different dealings with the cowherd boys and maidens. I offer my obeisances to that beautiful Golden Lord, GaurńĀŠĻÖga Sundar, the divine form of Krishna-*prema*.\"]},{\"number\":\"39\",\"text\":[\"prema-gu√ĪjanńĀli-pu√Īja-puŠĻ£pa-pu√Īja-ra√ĪjitaŠĻĀ\",\"gńęta-nŠĻõtya-dakŠĻ£a-pakŠĻ£i-vŠĻõkŠĻ£a-lakŠĻ£a-vanditam\",\"go-vŠĻõŠĻ£ńĀdi-nńĀda-dńępta-pŇęrva-moda-meduraŠĻĀ\",\"prema-dhńĀma-devam eva naumi gaura-sundaram\"],\"translation\":[\"While strolling through the forest groves of VŠĻõndńĀvan, the Lord was joyfully welcomed by swarms of humming bumblebees busily engaged in discussion about pure love as they hovered over the blooming flowers. Millions of trees lining the forest groves harmoniously offered their respects unto Lord Gaurasundar in unison with a variety of birds that were expertly singing and dancing in sheer delight. The Lord‚Äôs mind became overflooded by loving feelings due to remembering how the cows, calves, and oxen of the holy abode of VŠĻõndńĀvan would affectionately call for Him in previous Pastimes, thereby elating His emotions in pure love. I offer my obeisances to that beautiful Golden Lord, GaurńĀŠĻÖga Sundar, the divine form of Krishna-*prema*.\"]},{\"number\":\"40\",\"text\":[\"prema-buddha-ruddha-buddhi-matta-nŠĻõtya-kńęrtanaŠĻĀ\",\"plńĀvitńĀŇõru-kńĀ√ĪchanńĀŠĻÖga-vńĀsa-chńĀturaŠĻÖganam\",\"kŠĻõŠĻ£ŠĻáa-kŠĻõŠĻ£ŠĻáa-rńĀva-bhńĀva-hńĀsya-lńĀsya-bhńĀsvaraŠĻĀ\",\"prema-dhńĀma-devam eva naumi gaura-sundaram\"],\"translation\":[\"Hopelessly overwhelmed by a surge of pure love, Lord Gaurasundar madly danced and chanted the Holy Names of Krishna. A profuse current of flowing tears streamed from His eyes, passing over the radiant lustre of His giant golden form, over His brilliant garments that resembled the sun, and over the ground in all four directions. The Lord‚Äôs joyful Pastimes were ecstatically enhanced by such gestures as His loudly mispronouncing the Holy Name of Krishna in a delirious state, or His roaring with laughter due to being ecstatically absorbed in deep emotion. I offer my obeisances to that beautiful Golden Lord, GaurńĀŠĻÖga Sundar, the divine form of Krishna-*prema*.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.R. Madhusudan Maharaj\",\"ru\":\"–®—Ä–ł–Ľ–į –Ď.–†. –ú–į–ī—Ö—É—Ā—É–ī–į–Ĺ –ú–į—Ö–į—Ä–į–ī–∂\",\"ua\":\"–®—Ä—Ė–Ľ–į –Ď.–†. –ú–į–ī–≥—É—Ā—É–ī–į–Ĺ –ú–į—Ö–į—Ä–į–ī–∂\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/madhusudan-maharaj-prema-dhama\"}]},\"hasWbw\":false,\"h
