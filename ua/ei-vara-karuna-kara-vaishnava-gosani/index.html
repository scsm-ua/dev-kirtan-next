,\"first_line\":\"еі-ва̄ра каруна̄ кара вайшнава ґоса̄ні\",\"translator\":\"Alokananda Devi Dasi\",\"version\":\"draft2\"},\"title\":[\"Вайшнава Віґʼяпті\"],\"author\":[\"Шрīла Нароттам Да̄с Тха̄кур\"],\"verses\":[{\"number\":\"1\",\"text\":[\"еі-ва̄ра каруна̄ кара вайшнава ґоса̄ні\",\"патіта-па̄вана тома̄ віне кеха на̄і\"],\"word_by_word\":[\"**еі ва̄ра** — зараз; **каруна̄ кара** — будь ласкавий, вияв милість; **вайшнава ґоса̄ні** — о, Вайшнаве Ґосвамі!; **патіта-па̄вана** — спаситель занепалих душ; **тома̄ віне** — окрім тебе; **кеха на̄і** — нікого немає.\"],\"translation\":[\"О Вайшнав Ґосвамі, благаю, хоч цього разу будь до мене милостивий! Ти — спаситель відступників, ти — моя єдина надія!\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"еі-ва̄ра\",\"trans\":\"зараз\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"каруна̄ кара\",\"trans\":\"будь ласкавий, вияв милість\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"вайшнава ґоса̄ні\",\"trans\":\"о, Вайшнаве Ґосвамі!\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"патіта-па̄вана\",\"trans\":\"спаситель занепалих душ\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"тома̄ віне\",\"trans\":\"окрім тебе\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"кеха на̄і\",\"trans\":\"нікого немає\",\"sep\":\"\",\"error\":\"multi\"}]]},{\"number\":\"2\",\"text\":[\"ка̄ха̄ра нікате ґеле па̄па дӯре яя\",\"емана даяла прабгу кева̄ котха̄ па̄я\"],\"word_by_word\":[\"**ка̄ха̄ра нікате** — біля кого лише наблизившись; **ґеле** — підійшовши; **па̄па** — усі гріхи; **дӯре яя** — відходять геть; **емана даяла прабгу** — така милостива особа; **кева̄ котха̄ па̄я** — де ж можна знайти когось подібного?\"],\"translation\":[\"Сама твоя присутність стирає всі гріхи. Такої доброти більше ніде не знайти.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"ка̄ха̄ра нікате\",\"trans\":\"біля кого лише наблизившись\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"ґеле\",\"trans\":\"підійшовши\",\"sep\":\" \"},{\"text\":\"па̄па\",\"trans\":\"усі гріхи\",\"sep\":\" \"},{\"text\":\"дӯре яя\",\"trans\":\"відходять геть\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"емана даяла прабгу\",\"trans\":\"така милостива особа\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"кева̄ котха̄ па̄я\",\"trans\":\"де ж можна знайти когось подібного?\",\"sep\":\"\",\"error\":\"multi\"}]]},{\"number\":\"3\",\"text\":[\"ґанґа̄ра парашя хайле пашча̄те па̄вана\",\"даршяне павітра кара еі тома̄ра ґуна\"],\"word_by_word\":[\"**ґанґа̄ра парашя хайле** — торкнувшись вод священної Ґанґи; **пашча̄те па̄вана** — очищуєшся пізніше; **даршяне** — лише побачивши тебе; **павітра кара** — очищуєшся негайно; **еі** — це; **тома̄ра ґуна** — твоя якість.\"],\"translation\":[\"Священна вода Ґанґи здатна визволити найгіршого грішника. Та бодай одного погляду на тебе достатньо, аби досягти цього визволення. Така твоя природа.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"ґанґа̄ра парашя хайле\",\"trans\":\"торкнувшись вод священної Ґанґи\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"пашча̄те па̄вана\",\"trans\":\"очищуєшся пізніше\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"даршяне\",\"trans\":\"лише побачивши тебе\",\"sep\":\" \"},{\"text\":\"павітра кара\",\"trans\":\"очищуєшся негайно\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"еі\",\"trans\":\"це\",\"sep\":\" \"},{\"text\":\"тома̄ра ґуна\",\"trans\":\"твоя якість\",\"sep\":\"\",\"error\":\"multi\"}]]},{\"number\":\"4\",\"text\":[\"харі-стха̄не апара̄дге та̄ре харіна̄ма\",\"тома̄-стха̄не апара̄дге на̄хіка еда̄на\"],\"word_by_word\":[\"**харі-стха̄не** — Господу Харі; **апара̄дге** — вчинивши образу; **та̄ре харіна̄ма** — святе ім’я звільняє; **тома̄-стха̄не апара̄дге** — але якщо хтось образить тебе; **на̄хіка** — не буде; **еда̄на** — спасіння.\"],\"translation\":[\"Якщо хтось образить святі стопи Господа Харі, здобуде прощення через оспівування Його Святого Імені. Проте немає спасіння тому, хто образить тебе.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"харі-стха̄не\",\"trans\":\"Господу Харі\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"апара̄дге\",\"trans\":\"вчинивши образу\",\"sep\":\" \"},{\"text\":\"та̄ре харіна̄ма\",\"trans\":\"святе ім’я звільняє\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"тома̄-стха̄не апара̄дге\",\"trans\":\"але якщо хтось образить тебе\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"на̄хіка\",\"trans\":\"не буде\",\"sep\":\" \"},{\"text\":\"еда̄на\",\"trans\":\"спасіння\",\"sep\":\"\"}]]},{\"number\":\"5\",\"text\":[\"тома̄ра хридає сада̄ ґовінда-вішра̄ма\",\"ґовінда кахена мама вайшнава пара̄на\"],\"word_by_word\":[\"**тома̄ра хридає** — у твоєму серці; **сада̄** — завжди; **ґовінда-вішра̄ма** — місце відпочинку Господа Ґовінди; **ґовінда кахена** — Господь Ґовінда каже; **мама вайшнава пара̄на** — «вайшнави — це моє життя».\"],\"translation\":[\"У твоєму серці завжди Господь Ґовінда. Адже Сам Господь Шрі Ґовінда каже: «Мої віддані — Мої життя та душа».\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"тома̄ра хридає\",\"trans\":\"у твоєму серці\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"сада̄\",\"trans\":\"завжди\",\"sep\":\" \"},{\"text\":\"ґовінда-вішра̄ма\",\"trans\":\"місце відпочинку Господа Ґовінди\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"ґовінда кахена\",\"trans\":\"Господь Ґовінда каже\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"мама вайшнава пара̄на\",\"trans\":\"«вайшнави — це моє життя»\",\"sep\":\"\",\"error\":\"multi\"}]]},{\"number\":\"6\",\"text\":[\"праті джанме карі а̄шя чаранера дгулі\",\"нароттаме кара дая а̄пана̄ра валі\"],\"word_by_word\":[\"**праті джанме** — у кожному народженні, яке можу мати; **карі а̄шя** — прагну; **чаранера дгулі** — пилу з твоїх святих стіп; **нароттаме** — до Нароттами Даса; **кара дая** — будь ласкавий; **а̄пана̄ра валі** — і вважай своїм.\"],\"translation\":[\"Сподіваюся, що життя за життям я матиму нагоду шанувати пил з твоїх чудових, наче лотоси, стіп. Шрі Нароттам молить: «Вайшнав Ґосвамі, будь милостивий до мене!»\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"праті джанме\",\"trans\":\"у кожному народженні, яке можу мати\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"карі а̄шя\",\"trans\":\"прагну\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"чаранера дгулі\",\"trans\":\"пилу з твоїх святих стіп\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"нароттаме\",\"trans\":\"до Нароттами Даса\",\"sep\":\" \"},{\"text\":\"кара дая\",\"trans\":\"будь ласкавий\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"а̄пана̄ра валі\",\"trans\":\"і вважай своїм\",\"sep\":\"\",\"error\":\"multi\"}]]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.S. Govinda Dev-Goswami Maharaj\",\"ru\":\"Шрила Б.С. Говинда Дев-Госвами Махарадж\",\"ua\":\"Шріла Б.С. Ґовінда Дев-Ґосвамі Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/govinda-maharaj-ei-baro-koruna\"},{\"title\":{\"en\":\"Srila B.R. Madhusudan Maharaj\",\"ru\":\"Шрила Б.Р. Мадхусудан Махарадж\",\"ua\":\"Шріла Б.Р. Мадгусудан Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/madhusudan-maharaj-vaishnava\"}]},\"hasWbw\":true,\"hasVersesText\":true,\"hasVersesTranslations\":true,\"fullInlineWbw\":false}}]\n"])</script><script>self.__next_f.push([1,"1f:[\"$\",\"$L28\",null,{\"audio\":\"$1e:props:song:resources:audio\",\"language\":\"ua\"}]\n20:[\"$\",\"$L29\",null,{\"navMap\":{\"136\":{\"prev\":{\"path\":\"/ua/je-anilo-prema-dhana-karuna-prachura/\",\"title\":\"Віраха-ґīті\"},\"next\":{\"path\":\"/ua/kripa-kara-vaishnava-thakura/\",\"title\":\"Пра̄ртхана̄ Лаласа̄маї\"}}}}]\n2a:T89d,"])</script><script>self.__next_f.push([1,"{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"CollectionPage\",\"@id\":\"https://dev.kirtan.site/ua/ei-vara-karuna-kara-vaishnava-gosani\",\"url\":\"https://dev.kirtan.site/ua/ei-vara-karuna-kara-vaishnava-gosani
