\",\"sort_order\":20,\"render\":{\"tg.contents.first_line\":false,\"tg.a-z.title.words\":3},\"songsCount\":177},\"href\":\"/ru/bhagyadhishia-tvadiyo-vimala-sukhamayah/\",\"isActive\":false}],[\"$\",\"$L36\",\"ua\",{\"description\":{\"title\":\"ТҗР°СғРҙС–СҸ ТҗС–СӮР°РҪРҙР¶Р°Р»С–\",\"subtitle\":\"Р’Р°Р№СҲРҪР°РІСҒСҢРәРёР№ РҝС–СҒРөРҪРҪРёРә СғРәСҖР°С—РҪСҒРәРҫСҺ РјРҫРІРҫСҺ\",\"slug\":\"ua\",\"sort_order\":60,\"language\":\"uk\",\"render\":{\"tg.contents.first_line\":false,\"tg.a-z.title.words\":4},\"songsCount\":65},\"href\":\"/ua/bhagyadhishia-tvadiyo-vimala-sukhamayah/\",\"isActive\":true}]]}]}],[\"$\",\"$L37\",null,{\"bookId\":\"ua\"}]]}]]}],[\"$\",\"section\",null,{\"className\":\"SongHeader\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"SongHeader__title\",\"children\":[[\"$\",\"div\",\"РЁСҖД« ТҗСғСҖСғ-РҹСҖР°СҲСҸСҒСӮС–С…\",{\"children\":\"РЁСҖД« ТҗСғСҖСғ-РҹСҖР°СҲСҸСҒСӮС–С…\"}]]}],null,[],[[\"$\",\"div\",\"РЁСҖД«Р»Р° Р‘РіР°РәСӮС– РЎСғРҪРҙР°СҖ ТҗРҫРІС–РҪРҙР° Р”РөРІ-ТҗРҫСҒРІР°М„РјД« РңР°С…Р°М„СҖР°М„РҙР¶\",{\"className\":\"SongHeader__author\",\"children\":[\"$\",\"a\",null,{\"href\":\"/ua/authors\",\"children\":\"РЁСҖД«Р»Р° Р‘РіР°РәСӮС– РЎСғРҪРҙР°СҖ ТҗРҫРІС–РҪРҙР° Р”РөРІ-ТҗРҫСҒРІР°М„РјД« РңР°С…Р°М„СҖР°М„РҙР¶\"}]}]]]}]]}],[\"$\",\"$L38\",null,{\"label\":\"РҹРҫРәР°Р·СғРІР°СӮРё РІС–СҖСҲС– / РҝРөСҖРөРәР»Р°Рҙ\",\"song\":{\"meta\":{\"page\":279,\"translation\":\"no\",\"first_line\":\"РұРіР°М„Т‘КјСҸРҙРіД«СҲСҸ! СӮРІР°РҙД«Р№Рҫ РІС–РјР°Р»Р°-СҒСғРәС…Р°РјР°СҸС…\"},\"title\":[\"РЁСҖД« ТҗСғСҖСғ-РҹСҖР°СҲСҸСҒСӮС–С…\"],\"author\":[\"РЁСҖД«Р»Р° Р‘РіР°РәСӮС– РЎСғРҪРҙР°СҖ ТҗРҫРІС–РҪРҙР° Р”РөРІ-ТҗРҫСҒРІР°М„РјД« РңР°С…Р°М„СҖР°М„РҙР¶\"],\"verses\":[{\"number\":\"1\",\"text\":[\"РұРіР°М„Т‘КјСҸРҙРіД«СҲСҸ! СӮРІР°РҙД«Р№Рҫ РІС–РјР°Р»Р°-СҒСғРәС…Р°РјР°СҸС…\",\"    СҒР°РјРҝСҖР°РәР°М„СҲСҸСҒСӮСғ-РҪС–СӮСҢР№Рҫ\",\"Т‘Р°СғРҙР°Рј СҖР°М„РҙРіР°Рј СӮР°СӮС…РөРҙР°Рј СӮСҖС–РұРіУҜРІР°РҪР°Рј-Р°РәС…С–Р»Р°Рј\",\"    РҙРіР°РҪСҢСҸ-РҙРіР°РҪСҢСҸРҪ СҮР°РәР°М„СҖР°\",\"РәС…Р°РҪРҙРө РәР°М„Р»Рө РҙСҖРёСҲСҸРј РҪРҫ Т‘Р°Т‘Р°РҪР°-СҖР°СҒР°РјС–СӮР°Рј\",\"    РҝУҜСҖР°С—СӮРІР°М„ РұСғРҙРіР°М„РҪР°М„вҖ“\",\"РјР°М„РҪР°РҪРҙР°Рј РұР°СҖРҙРіР°СҸРҪ РІР°Р№ СҒРІР°-РҝР°СҖС–РҙР¶Р°РҪР°-Т‘Р°РҪР°Р№СҖ-\",\"    РҙРіР°М„РјР°РҪС– СӮРІР°Рј РІС–РұРіР°М„СҒС–\"]},{\"number\":\"2\",\"text\":[\"РҙРөРІР°М„РҙСҢСҸСҒСӮРө вҖҳРәС…С–Р»Р° Т‘СғРҪР°-Т‘Р°РҪР°М„РҪ-\",\"    РҪР°Р№РІР° Т‘Р°М„СӮСғРј СҒР°РјР°СҖСӮС…Р°М„С…\",\"РәРІР°М„С…Р°Рј РҙР¶Д«РІРҫ вҖҷСӮС–СҲСҸСҸ-РҝР°СӮС–СӮРҫ\",\"    РјР°РҪРҙР°-РұРіР°М„Т‘Р№Рҫ вҖҷСӮС– РәСҲСғРҙСҖР°С…\",\"РұРіРҫ Р°М„СҖР°М„РҙРіКјСҸ! СҒСӮР°РІР°РҪР°-РІС–СҲР°С”\",\"    РәС–РҪСӮСғ РҙД«РҪР°М„РҙРіР°РјР°СҒСҢСҸ\",\"РҝСҖР°СӮСҢСҸСҲСҸ СӮР°СӮ-СҒСғРәР°СҖСғРҪР°СӮР°СҸ\",\"    РІД«СҖР°СҮР°РҪРҙСҖР°М„РұРіС–РҙР°СҒСӮРІР°Рј\"]},{\"number\":\"3\",\"text\":[\"РҙСҖРёСҲСӮРІР°М„ РІС–СҲРІР°СҒСҢСҸ РҙР¶Д«РІР°М„РҪ РәС…Р°Р»Сғ С…Р°СҖС–-РІС–РјСғРәС…Р°М„РҪ\",\"    Т‘Р°СғСҖР°-РҙРөРІРҫ РҙР°СҸСҸ\",\"СҖУҜРҝР°Рј Т‘Р°СғРҙРө РұРіР°РІР°СҒСӮР°Рј РҝР°СҖР°РјР°-РәР°СҖСғРҪР°СҸ\",\"    РҝСҖР°М„С…С–РҪРҫРҙ- РҙД«РҪР° РұР°РҪРҙРіРҫ!\",\"РөСӮР°РҙР¶ Т‘КјСҸСӮРІР°М„ РҝСҖР°РәР°М„СҲСҸСӮ СҒСғРҙС–РҪР°-СҒР°РјСғРҙР°СҸРј\",\"    СҒРјР°М„СҖР°РјР°М„СҲСҸС… СҒР°С…Р°СҖСҲР°М„\",\"РҙР¶Р°СҸРҪСӮРө СҮР°Р№РІР° РјР°М„СҸ-РҪС–Т‘Р°РҙР°-РҪС–РәР°СҖР°-\",\"    СҒР°РјРјРҫСҮР°РҪРө вҖҷСҒРјР°РәР°РјР°РҙРҙРіР°М„\"]},{\"number\":\"4\",\"text\":[\"СҸРҙРІР°Рҙ-РұРіР°М„РҪСғС… РәС–СҖР°РҪР°-РҪС–РәР°СҖР°Р№СҖ-\",\"    РұРіР°М„СҒР°СҸРҪ РІС–СҲРІР°Рј РөСӮР°РҪ\",\"РҪР°М„СҲСҸРј РәСҖРёСӮРІР°М„ РҪС–РәС…С–Р»Р°-СӮР°РјР°СҒР°М„Рј\",\"    СӮРөРҙР¶Р°СҒР°М„ СҒР°РјРІС–РұРіР°М„СӮС–\",\"РәСҖРёСӮРІР°М„ РҪР°М„СҲСҸРј РҝСҖР°РәСҖРёСӮС–-СӮР°РјР°СҒР°М„Рј\",\"    СҒР°СӮСҢСҸ-СҒУҜСҖКјСҸРј РҝСҖР°РәР°М„СҲСҢСҸ\",\"РҙС–РІКјСҸ-Т‘КјСҸРҪР°Р№СҖ-С…Р°СҖС–-Т‘СғРҪР°-Т‘Р°РҪР°Р№СҒ\",\"    СӮРІР°РҪ СҮР° СӮР°РҙРІР°Рҙ-РІС–РұРіР°М„СҒС–\"]},{\"number\":\"5\",\"text\":[\"РҙСғС…РәС…Р°Р№С… РҝУҜСҖРҪР°Рј РІС–РұСғРҙРіР°-С…СҖРёРҙР°СҸРј\",\"    РәР°М„Р»Р°-РҙРіР°СҖРјР°М„СҮ СҮР° РҙСҖРёСҲСӮРІР°М„\",\"РјР°М„СҸРІР°М„РҙР°М„РҪ РәР°Р»С–РҙР¶Р°РәСғРјР°СӮР°М„РҪ\",\"    РҙСғСҲРәСҖРёСӮР°М„РҪ СҲСҸСҒС–СӮСғРҪ СҮР°\",\"РҙРөСҲС” РҙРөСҲС” РұРіСҖР°РјР°СҒС– РІС–СӮР°СҖР°РҪ\",\"    Т‘Р°СғСҖР°-РІР°М„РҪД«РҪ СҮР° РҪР°М„РјР°\",\"РҙРіСҖРёСӮРІР°М„ РҙРөРІР°! СӮСҖС–РұРіСғРІР°РҪР°-РҙР¶Р°СҸРј\",\"    РІР°РҙР¶СҖР°-РәР°Р»РҝР°Рј СӮСҖС–РҙР°РҪРҙР°Рј\"]},{\"number\":\"6\",\"text\":[\"РІР°СҖСҲР°М„СҸРј РІР°Р№ СҒР°РҙР¶Р°Р»Р°-РҙР¶Р°Р»Р°РҙРҫ\",\"    РІР°М„РҙР°СҸРҪ РјР°РҪРҙСҖР°РұРіРөСҖС–Рј\",\"СҸРҙСҢСҸРҙ РІС–СҲРІРө РұРіСҖР°РјР°СӮС– РұР°С…СғРҙРіР°М„\",\"    РІР°М„СҖС–РҙРіР°М„СҖР°М„РҪ СҮР° РІР°СҖСҲР°РҪ\",\"СӮР°РҙРІР°Рҙ-РұРіУҜРјР°Сғ РұРіСҖР°РјР°СҒС– СҒР°Т‘Р°РҪР°Р№СҖ-\",\"    РіРҫСҲР°СҸРҪ Т‘Р°СғСҖР°-Т‘Р°М„СӮС…Р°М„\",\"РҪС–СӮСҢСҸРј РҙС–РІКјСҸРјСҖРёСӮР°-СҒСғРәР°СҖСғРҪР°М„Рј\",\"    СӮРІР°Рј С…С– РҙРөРІР°! РҝСҖР°РІР°СҖСҲР°РҪ\"]},{\"number\":\"7\",\"text\":[\"СҲСҖД«-СҮР°Р№СӮР°РҪСҢСҸ-РІС–Р»Р°М„СҒР°-РҙРіР°М„РјР°РҪС–\",\"    РҪР°РІР°РҙРІД«РҝР°М„СҲСҖР°РјРө СҒСғРҪРҙР°СҖРө\",\"СҲСҖД«-Т‘Р°СғСҖР°М„РҪТ‘Р°-РІС–РҙРіРҫСҒ-СӮР°СӮС…Р°М„ РІСҖР°РҙР¶Р° СҺРҪРҫС…\",\"    СҒРөРІР°М„-СҒСғРҙРіР°М„-СҒР°РјРҝР°РҙР°Рј\",\"СӮР°РҙРІР°РҪ Т‘Р°М„РҪТ‘Р°-СӮР°СӮРө РҙР°СҸРјР°СҸ-РІС–РұРіРҫ!\",\"    СҒР°РҙРіУҜРҪ СҒР°РјР°М„С…Р»Р°М„-РҙР°СҸРҪ\",\"СҲСҖД«-СҖУҜРҝР°М„РҪСғТ‘Р°-СҒР°РјРҝСҖР°РҙР°М„СҸ-РІС–РұРіР°РІР°М„РҪСғРҙ\",\"    РұРіР°М„СҒР°СҸРҪ РұРіР°М„СҒР°СҒРө\"]},{\"number\":\"8\",\"text\":[\"СҮР°М„СҖРІР°М„РәР°М„РҪСӮР°-РәСҖРёСӮР°М„РҪСӮР°РәРҫ вҖҷРәС…С–Р»Р°\",\"    Т‘СғСҖСғС… РҝР°М„СҲР°РҪРҙР°-СҲСҸР№Р»Р°М„СҲСҸРҪС–СҖ\",\"РұР°СғРҙРҙРіР°-РҙРіРІР°М„РҪСӮР°-РјР°СӮР°М„РҪСӮР°-РҙР°М„СҸРәР°\",\"    РјР°С…Р°М„РјР°М„СҖСӮР°РҪРҙР°-СҮУҜРҙР°М„РјР°РҪС–С…\",\"РјР°М„СҸРІР°М„РҙР°-РјР°С…Р°М„РІС–РІР°СҖСӮР°-\",\"    Т‘Р°С…Р°РҪР°М„РҙР¶-РҙР¶Д«РІР°М„РҪ СҒР°РјСғРҙРҙРіР°М„-РІР°СҸРҪ\",\"СҲСҖД«-Т‘Р°СғСҖРөРҪРҙСғ-РҙР¶Р°СҸ-РҙРіРІР°РҙР¶Рҫ РІС–РҙР¶Р°СҸСӮРө\",\"    СҒРІР°М„РјС–РҪ РұРіР°РІР°М„РҪ РҪС–СӮСҢСҸСҲСҸС…\"]},{\"number\":\"9\",\"text\":[\"СҲСҖД«-Т‘Р°СғСҖР°М„РҪТ‘Р°-СҒР°СҖР°СҒРІР°СӮД«-РҙРіСғРҪС–РҙРіР°СҖР°!\",\"    СҲСҖД«-РұРіР°РәСӮС–-СҒР°РјСҖР°Рә-СҲР°РәР°!\",\"СҲСҖД«-СҒС–РҙРҙРіР°М„РҪСӮР°-СҒР°СҖР°СҒРІР°СӮД« РҝСҖС–СҸРІР°СҖР°!\",\"    РҪСҢСҸСҒД«СҲРІР°СҖР°! СҲСҖД«-Т‘СғСҖРҫ!\",\"РҙРөРІР°М„РҙСҢС”С…Р°! РұРіР°РІР°СӮ-СҲСҺРұРіРҫРҙР°СҸ-\",\"    РҙС–РҪРө СҒР°РјРҝСҖР°М„СҖСӮС…Р°С” вҖҷС…Р°Рј РІС–РұРіРҫ!\",\"РҝР°М„РҙР°М„РұРҙР¶Рө РәС…Р°Р»Сғ РҪС–СӮСҢСҸ-РұРіСҖРёСӮСҢСҸ С–СӮС–\",\"    РјРө РәР°М„СҖСғРҪСҢСҸРј-Р°М„СӮР°РҪ-РІР°СӮР°М„Рј\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.N. Acharya Maharaj\",\"ru\":\"РЁСҖРёР»Р° Р‘.Рқ. РҗСҮР°СҖСҢСҸ РңР°С…Р°СҖР°РҙР¶\",\"ua\":\"РЁСҖС–Р»Р° Р‘.Рқ. РҗСҮР°СҖКјСҸ РңР°С…Р°СҖР°РҙР¶\"},\"embed_url\":\"https://soundcloud.com/kostya-netrebenko/092-bhagyadhisatvadiyo-sriguruprasasti-13\"}]}}}],\"$L39\"]}]}],\"$L3a\",\"$L3b\"]}]]}],\"$L3c\"]}],\"$L3d\",\"$L3e\"]}]]}]\n"])</script><script>self.__next_f.push([1,"3f:I[8340,[\"973\",\"static/chunks/973-7a24f1179010df70.js\",\"8043\",\"static/chunks/8043-6febb00cfe1727ef.js\",\"4925\",\"static/chunks/4925-2fb4b604fb7ad250.js\",\"4989\",\"static/chunks/app/%5BbookId%5D/%5Bslug%5D/page-7d97bee5c131e326.js\"],\"default\"]\n40:I[7646,[\"973\",\"static/chunks/973-7a24f1179010df70.js\",\"8043\",\"static/chunks/8043-6febb00cfe1727ef.js\",\"4925\",\"static/chunks/4925-2fb4b604fb7ad250.js\",\"4989\",\"static/chunks/app/%5BbookId%5D/%5Bslug%5D/page-7d97bee5c131e326.js\"],\"default\"]\n42:I[6928,[\"973\",\"static/chunks/973-7a24f1179010df70.js\",\"8043\",\"static/chunks/8043-6febb00cfe1727ef.js\",\"4925\",\"static/chunks/4925-2fb4b604fb7ad250.js\",\"4989\",\"static/chunks/app/%5BbookId%5D/%5Bslug%5D/page-7d97bee5c131e326.js\"],\"default\"]\n43:I[784,[\"973\",\"static/chunks/973-7a24f1179010df70.js\",\"8043\",\"static/chunks/8043-6febb00cfe1727ef.js\",\"4925\",\"static/chunks/4925-2fb4b604fb7ad250.js\",\"4989\",\"static/chunks/app/%5BbookId%5D/%5Bslug%5D/page-7d97bee5c131e326.js\"],\"GoogleAnalytics\"]\n44:I[6229,[\"973\",\"static/chunks/973-7a24f1179010df70.js\",\"8043\",\"static/chunks/8043-6febb00cfe1727ef.js\",\"4925\",\"static/chunks/4925-2fb4b604fb7ad250.js\",\"4989\",\"static/chunks/app/%5BbookId%5D/%5Bslug%5D/page-7d97bee5c131e326.js\"],\"ServiceWorkerRegistration\"]\n39:[\"$\",\"$L3f\",null,{\"audio\":\"$4:props:children:1:props:children:0:p
