ґія,    шятхʼя-а̄чарана,\",\"    лобга-хата сада̄ ка̄мī\"],\"translation\":[\"Спустошений від ліні й сну, я відкидаю всяке благочестя \\\\\",\"та з особливою жагою прагну до творіння зла.\\\\\",\"Брехнею здобуваю я мирські повагу й славу.\\\\\",\"Я - жадібності жертва і похоті постійний раб.\"]},{\"number\":\"5\",\"text\":[\"е хено дурджана,    саджджана-варджіта,\",\"    апара̄дгі нірантара\",\"шюбга-ка̄рджа-шюнья,    сада̄нартха-мана̄х,\",\"    на̄на̄ духкхе джара джара\"],\"translation\":[\"Такий порочний грішник відторгнутий благочестивим людом.\\\\\",\"Наповнений зневагами, позбавлений благодіянь,\\\\\",\"завжди у настрої «тільки собі й для себе»,\\\\\",\"ослаблений від безлічі страждань.\"]},{\"number\":\"6\",\"text\":[\"ба̄рдгакʼє екхона,    упа̄я-віхīна,\",\"    та̄’те дīна акіньчана\",\"бгакатівінода,    прабгура чаране,\",\"    коре духкха ніведана\"],\"translation\":[\"Відтак, Бгактівінод на старості років \\\\\",\"позбавлений відрад, принижений й злиденний,\\\\\",\"до лотосових стоп Верховного Владики \\\\\",\"підносить зі смиренням печальну повість своїх літ.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Bhudev Prabhu\",\"ru\":\"Бхудев Прабху\",\"ua\":\"Бгудев Прабгу\"},\"embed_url\":\"https://soundcloud.com/jayasri-sound/05-amara-jivana\"},{\"title\":{\"en\":\"Srila B.N. Acharya Maharaj\",\"ru\":\"Шрила Б.Н. Ачарья Махарадж\",\"ua\":\"Шріла Б.Н. Ачарʼя Махарадж\"},\"embed_url\":\"https://soundcloud.com/kostya-netrebenko/017-amarajivana-1\"}]},\"hasWbw\":false,\"hasVersesText\":true,\"hasVersesTranslations\":true,\"fullInlineWbw\":false}}]\n"])</script><script>self.__next_f.push([1,"28:[\"$\",\"$L31\",null,{\"audio\":\"$27:props:song:resources:audio\",\"language\":\"ua\"}]\n29:[\"$\",\"$L32\",null,{\"navMap\":{\"161\":{\"prev\":{\"path\":\"/ua/atma-nivedana-tuya-pade-kori/\",\"title\":\"А̄тма-ніведана\"},\"next\":{\"path\":\"/ua/tumi-sarveshvareshvara-vrajendra-kumara/\",\"title\":\"Тумі сарвешварешвара\"}}}}]\n33:T798,"])</script><script>self.__n
