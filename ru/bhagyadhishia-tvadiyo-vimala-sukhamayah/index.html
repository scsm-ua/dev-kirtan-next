tic/chunks/5842-7e56d350933c83c0.js\",\"7984\",\"static/chunks/7984-5c75571e23a8f6ce.js\",\"1552\",\"static/chunks/1552-37c954ff35c4ac3d.js\",\"4989\",\"static/chunks/app/%5BbookId%5D/%5Bslug%5D/page-b93d45e2966de543.js\"],\"ServiceWorkerRegistration\"]\n49:I[3680,[\"5842\",\"static/chunks/5842-7e56d350933c83c0.js\",\"7984\",\"static/chunks/7984-5c75571e23a8f6ce.js\",\"1552\",\"static/chunks/1552-37c954ff35c4ac3d.js\",\"4989\",\"static/chunks/app/%5BbookId%5D/%5Bslug%5D/page-b93d45e2966de543.js\"],\"default\"]\n"])</script><script>self.__next_f.push([1,"3a:[\"$\",\"$L42\",null,{\"bookId\":\"ru\",\"label\":\"Показывать стихи / перевод\",\"song\":{\"meta\":{\"page\":279,\"first_line\":\"бха̄гйа̄дхӣш́а! твадӣйо бимала-сукхамайах̣\"},\"title\":[\"Шри Гуру-Прашаштих\"],\"author\":[\"Ш́рӣла Бхакти Сундар Говинда Дев-Госва̄мӣ Маха̄ра̄дж\"],\"verses\":[{\"number\":\"1\",\"text\":[\"бха̄гйа̄дхӣш́а! твадӣйо бимала-сукхамайах̣\",\"    сампрака̄ш́асту-нитйо\",\"гауд̣ам̇ ра̄д̣хам̇ татхедам̇ трибхӯванам-акхилам̇\",\"    дханйа-дханйан чака̄ра\",\"кхан̣д̣е ка̄ле др̣ш́а̄м̇ но гаган̣а-расамитам̇\",\"    пӯрайитва̄ будха̄на̄-\",\"ма̄нандам̇ бардхайан ваи сва-париджана-ган̣аир-\",\"    дха̄мани твам̇ вибха̄си\"],\"translation\":[\"О творец судьбы! Божественный владыка! Твой чистый блаженный облик вечен. Жители Гауды, Радха и вся вселенная говорят о твоем добродетельном и благословляющем облике. Кажется, что время замирает в твоем присутствии и небеса исполнены твоих чудесных качеств. Твое появление дарует радость всем святым личностям, и эта радость увеличивается, не зная границ, благодаря тому, что ты вместе со своими божественными спутниками освещаешь святую Дхаму.\"]},{\"number\":\"2\",\"text\":[\"дева̄дйа̄сте ’кхила гун̣а-ган̣а̄н-\",\"    наива га̄тум̇ самартха̄х̣\",\"ква̄хам̇ джӣво ’тиш́айа-патито\",\"    манда-бха̄гйо ’ти кш̣удрах̣\",\"бхо а̄ра̄дхйа! ставана-виш̣айе\",\"    кинту дӣна̄дхамасйа\",\"пратйа̄ш́а̄ тат-сукарун̣атайа̄\",\"    вӣрачандра̄бхидаствам\"],\"translation\":[\"Даже боги и богини не способны воспевать твои достойные прославления качества. Что же говорить обо мне?! Я самая падшая душа, неудачливое крошечное живое существо. О обожаемый почитаемый Гурудев! Твои благословения и милость могут вдохновить меня петь с надеждой, ибо ты неотличен от Вирачандры Прабху.\"]},{\"number\":\"3\",\"text\":[\"др̣ш̣т̣ва̄ виш́васйа джӣва̄н кхалу хари-вимукха̄н\",\"    гаура-дево дайа̄йа̄\",\"рӯпам̇ гауд̣е бхавастам̇ парама-карун̣айа̄\",\"    пра̄хинод-дӣна бандхо!\",\"этадж джн̃а̄тва̄ прака̄ш́а̄т судина-самудайам̇\",\"    сма̄рама̄ш́а̄х̣ сахарш̣а̄\",\"джайанте чаива ма̄йа̄-нигад̣а-никара-\",\"    сам̇мочане ’смакамаддха̄\"],\"translation\":[\"Чтобы присматривать за теми жителями вселенной, которые питают неприязнь к Шри Хари, Господу, Шри Гаурахари милостиво отправил тебя в качестве их покровителя и опекуна в родную для Шри Рупы Гаудадешу. Благодаря памятованию о твоем благоприятном дне явления, мы можем разрубить узы *майи*, неведения материалистичного невежества.\"]},{\"number\":\"4\",\"text\":[\"йадвад-бха̄нух̣ киран̣а-никараир-\",\"    бха̄сайан виш́вам этан\",\"на̄ш́ам̇ кр̣тва̄ никхила-тамаса̄м̇\",\"    теджаса̄ сам̇вибха̄ти\",\"кр̣тва̄ на̄ш́ам̇ пракр̣ти-тамаса̄м̇\",\"    сатйа-сӯрйам̇ прака̄ш́йа\",\"дивйа-джн̃а̄наир-хари-гун̣а-ган̣аис\",\"    тван ча тадвад-вибха̄си\"],\"translation\":[\"Подобно солнцу, которое рассеивает всю тьму вселенной, распространяя свои лучи и сияние во все стороны, ты сияешь и рассеиваешь тьму *майи*, являясь истинным солнцем божественного знания, исполненный всесильных достояний Шри Хари.\"]},{\"number\":\"5\",\"text\":[\"дух̣кхаих̣ пӯрн̣ам̇ вибудха-хр̣дайам̇\",\"    ка̄ла-дхарма̄ч ча др̣ш̣т̣ва̄\",\"ма̄йа̄ва̄да̄н калиджакумата̄н\",\"    душ̣кр̣та̄н ш́а̄ситун ча\",\"деш́е деш́е бхрамаси витаран\",\"    гаура-ва̄н̣ӣн ча на̄ма\",\"дхр̣тва̄ дева! трибхувана-джайам̇\",\"    ваджра-калпам̇ тридан̣д̣ам\"],\"translation\":[\"О мой господин! Приняв подобный грому монашеский * (санньяси)* тройной посох *(триданду)* и покоряя вселенную, ты странствовал от места к месту, распространяя учение Гауранги *(гаура-вани)*, чтобы доставить радость очерствевшим сердцам мыслящих людей и уничтожить безличные концепции и демонические идеи, возросшие благодаря влиянию века Кали.\"]},{\"number\":\"6\",\"text\":[\"варш̣а̄йа̄м̇ ваи саджала-джаладо\",\"    ва̄дайан мандрабхерим̇\",\"йадйад виш́ве бхрамати бахудха̄\",\"    ва̄ридха̄ра̄н ча варш̣ан\",\"тадвад-бхӯмау бхрамаси саган̣аир-\",\"    гхош̣айан гаура-га̄тха̄\",\"нитйам̇ дивйа̄мр̣та-сукарун̣а̄м̇\",\"    твам̇ хи дева! праварш̣ан\"],\"translation\":[\"В сезон дождей наполненные водой облака движутся по небу с оглушительным громом и проливают дожди. Так же и ты, путешествуя через вселенную, проливаешь свои милосердные божественные дожди. Когда ты распространяешь славу Господа Гауранги, твое шествие по земле вместе с твоими спутниками подобно раскатам грома. О мой господин, так ты вечно проливаешь на всех нектар своей высочайшей милости.\"]},{\"number\":\"7\",\"text\":[\"ш́рӣ-чаитанйа-вила̄са-дха̄мани\",\"    навадвӣпа̄ш́раме сундаре\",\"ш́рӣ-гаура̄н̇га-видхос-татха̄ браджа йунох̣\",\"    сева̄-судха̄-сампадам\",\"тадван га̄н̇га-тат̣е дайа̄майа-вибхо!\",\"    садхӯн сама̄хла̄-дайан\",\"ш́рӣ-рӯпа̄нуга-сампрада̄йа-вибхава̄нуд\",\"    бха̄сайан бха̄сасе\"],\"translation\":[\"В Навадвипе, месте воплощения Шри Чайтаньи, на берегах реки Ганги, ты построил прекрасное уединенное жилище, наполненное богатством концепции Шри Гаурачандры, поклонения юному сыну Враджи, Шри Говиндасундару. О сострадательный владыка! Здесь ты почитал святых преданных и дарил им радость, совершенным образом объясняя высочайшее учение Шри Рупы, лично явившегося с целью пролить милость Господа.\"]},{\"number\":\"8\",\"text\":[\"ча̄рва̄ка̄нта-кр̣та̄нтако ’кхила\",\"    гурух̣ па̄ш̣ан̣д̣а-ш́аила̄ш́анир\",\"бауддха-дхва̄нта-мата̄нта-дайака\",\"    маха̄ма̄ртан̣д̣а-чӯд̣а̄ман̣их̣\",\"ма̄йа̄ва̄да-маха̄виварта-\",\"    гахан̣а̄дж-джӣва̄н самуддха̄-вайан\",\"ш́рӣ-гауренду-джайа-дхваджо виджайате\",\"    сва̄мин бхава̄н нитйаш́ах̣\"],\"translation\":[\"Уничтоживший философию Чарваки Риши, ты божественный учитель и покровитель всех. Ты подобное камню оружие против безбожников этого мира. Ты словно яркое солнце в сравнении с тьмой буддизма, и ты оберегаешь души этого мира от ужасной ямы имперсоналистического мышления. Ты развеваешь победный флаг Шри Гаурачандры *или* и для Шри Гауренду (поэта) ты флаг победы.\"]},{\"number\":\"9\",\"text\":[\"ш́рӣ-гаура̄н̇га-сарасватӣ-дхунидхара!\",\"    ш́рӣ-бхакти-сам̇рак-ш̣ака!\",\"ш́рӣ-сиддха̄нта-сарасватӣ прийавара!\",\"    нйа̄сӣш́вара! ш́рӣ-гуро!\",\"дева̄дйеха! бхават-ш́убходайа-\",\"    дине сам̇пра̄ртхайе ’хам̇ вибхо\",\"па̄да̄бдже кхалу нитйа-бхр̣тйа ити\",\"    ме ка̄рун̣йам-а̄тан-вата̄м\"],\"translation\":[\"О мой господин! О божественный хранитель потока учения Шри Гауранги, нисходящего через Шрилу Сарасвати Тхакура! Покровитель чистой преданности, самый дорогой ученик Шрилы Сарасвати Тхакура, ты высочайший *санньяси* и великий духовный наставник. О мой господин! Сегодня в день твоего явления этот вечный слуга твоих лотосоподобных стоп молит о том, чтобы всегда омываться в потоке твоей милости.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.N. Acharya Maharaj\",\"ru\":\"Шрила Б.Н. Ачарья Махарадж\",\"ua\":\"Шріла Б.Н. Ачарʼя Махарадж\"},\"embed_url\":\"https://soundcloud.com/kostya-netrebenko/092-bhagyadhisatvadiyo-sriguruprasasti-13\"}]},\"hasWbw\":false,\"hasVersesText\":true,\"hasVersesTranslations\":true,\"fullInlineWbw\":false}}]\n"])</script><script>self.__next_f.push([1,"3b:[\"$\",\"$L43\",null,{\"audio\":\"$3a:props:song:resources:audio\",\"language\":\"ru\"}]\n3c:[\"$\",\"$L44\",null,{\"navMap\":{\"279\":{\"prev\":{\"path\":\"/ru/devadidevam-ahibhushanam-indukashiam/\",\"title\":\"Гангадхара Садашива Пранам-мантрам\"},\"next\":{\"path\":\"/ru/nava-nalina-ganjitam-kusuma-dala/\",\"title\":\"Пранати-Панчакам\"}}}}]\n45:T6fe,"])</script><script>self.__
