$L43\",null,{\"label\":\"РҹРҫРәР°Р·СӢРІР°СӮСҢ СҒСӮРёС…Рё / РҝРөСҖРөРІРҫРҙ\",\"song\":{\"meta\":{\"page\":58,\"first_line\":\"РұС…Р°РҙР¶Р° РұС…Р°РәР°СӮР°-РІР°СӮСҒР°Р»Р° СҲМҒСҖУЈ РіР°СғСҖР°С…Р°СҖРё\"},\"title\":[\"РЁСҖРё Р‘С…РҫРіР°-Р°СҖР°СӮРё Р“РёСӮРё\"],\"author\":[\"РЁМҒСҖРёМ„Р»Р° Р‘С…Р°РәСӮРёРІРёРҪРҫРҙ РўМЈС…Р°М„РәСғСҖ\"],\"verses\":[{\"number\":\"1\",\"text\":[\"РұС…Р°РҙР¶Р° РұС…Р°РәР°СӮР°-РІР°СӮСҒР°Р»Р° СҲМҒСҖУЈ РіР°СғСҖР°С…Р°СҖРё\",\"СҲМҒСҖУЈ-РіР°СғСҖР°С…Р°СҖРё СҒРҫС…Рё РіРҫСҲМЈСӮМЈС…Р°-РұРёС…Р°М„СҖРёМ„,\",\"РҪР°РҪРҙР°-РҙР¶Р°СҲМҒРҫРјР°СӮУЈ-СҮРёСӮСӮР°-С…Р°М„СҖРё\"],\"translation\":[\"РҹСҖРҫСҒСӮРҫ РҝРҫРәР»РҫРҪСҸР№СҒСҸ РЁСҖРё Р“Р°СғСҖР°С…Р°СҖРё, РәРҫСӮРҫСҖСӢР№ РІСҒРөРіРҙР° Р·Р°РұРҫСӮРёСӮСҒСҸ Рҫ РЎРІРҫРёС… РҝСҖРөРҙР°РҪРҪСӢС…! РһРҪ вҖ” СӮРҫСӮ СҒР°РјСӢР№ Р’РөСҖС…РҫРІРҪСӢР№ Р“РҫСҒРҝРҫРҙСҢ РҡСҖРёСҲРҪР°, РәРҫСӮРҫСҖСӢР№ Р·Р°РұР°РІР»СҸР»СҒСҸ РҝР°СҒСӮСғСҲРөСҒРәРёРјРё РёРіСҖР°РјРё РІРҫ Р’СҖР°РҙР¶Рө Рё РҝРҫС…РёСӮРёР» СҒРөСҖРҙСҶР° РқР°РҪРҙСӢ Рё РҜСҲРҫРҙСӢ.\"]},{\"number\":\"2\",\"text\":[\"РұРөР»Р°М„ С…РҫвҖҷР»Рҫ, РҙР°М„РјРҫРҙР°СҖР°, Р°М„РёСҒР° СҚРәС…Р°РҪРҫ\",\"РұС…РҫРіР°-РјР°РҪРҙРёСҖРө РұРҫСҒРёвҖҷ РәРҫСҖР°С…Рҫ РұС…РҫРҙР¶Р°РҪР°\"],\"translation\":[\"РңР°СӮСҢ РҜСҲРҫРҙР° Р·РҫРІРөСӮ РҡСҖРёСҲРҪСғ: В«Р”РҫСҖРҫРіРҫР№ Р”Р°РјРҫРҙР°СҖ, СғР¶Рө РҝРҫР·РҙРҪРҫ. РҳРҙРё РҙРҫРјРҫР№, СҒР°РҙРёСҒСҢ Р·Р° СҒСӮРҫР» Рё РҫСӮРҫРұРөРҙР°Р№!В»\"]},{\"number\":\"3\",\"text\":[\"РҪР°РҪРҙРөСҖР° РҪРёСҖРҙРөСҲМҒРө РұР°РёСҒРө РіРёСҖРё-РұР°СҖР°-РҙС…Р°М„СҖРё\",\"РұР°Р»Р°РҙРөРІР°-СҒР°С…Р° СҒР°РәС…Р°М„ РұР°РёСҒРө СҒР°М„СҖРё СҒР°М„СҖРё\"],\"translation\":[\"РҹРҫ РІРөР»РөРҪРёСҺ РқР°РҪРҙСӢ РңР°С…Р°СҖР°РҙР¶Р°, РҡСҖРёСҲРҪР°, РҝРҫРҙРҪСҸРІСҲРёР№ С…РҫР»Рј Р“РҫРІР°СҖРҙС…Р°РҪ, СҒР°РҙРёСӮСҒСҸ РҫРұРөРҙР°СӮСҢ, Р° РІСҒР»РөРҙ Р·Р° РқРёРј СҒР°РҙСҸСӮСҒСҸ Рё РІСҒРө РјР°Р»СҢСҮРёРәРё-РҝР°СҒСӮСғСҲРәРё РІРјРөСҒСӮРө СҒРҫ СҒСӮР°СҖСҲРёРј РұСҖР°СӮРҫРј РҡСҖРёСҲРҪСӢ, РЁСҖРё Р‘Р°Р»Р°РҙРөРІРҫР№.\"]},{\"number\":\"4\",\"text\":[\"СҲМҒСғРәСӮР°М„-СҲМҒР°М„РәР°М„РҙРё РұС…Р°М„РҙР¶Рё РҪР°М„Р»РёСӮР°М„ РәСғСҲМЈРјР°М„РҪМЈРҙМЈР°\",\"РҙМЈР°М„Р»Рё РҙМЈР°М„Р»РҪР°М„ РҙСғРіРҙС…Р°-СӮСғРјРұУЈ РҙР°РҙС…Рё РјРҫСҮР°М„-РіС…Р°РҪМЈСӮМЈР°\"],\"translation\":[\"РҳС… Р¶РҙСғСӮ СҖР°Р·РҪРҫРҫРұСҖР°Р·РҪСӢРө СғРіРҫСүРөРҪРёСҸ: *СҲСғРәСӮСғ* Рё Р·РөР»РөРҪСҢ СҒРјРөРҪСҸСҺСӮ Р°РҝРҝРөСӮРёСӮРҪСӢРө Р¶Р°СҖРөРҪСӢРө РұР»СҺРҙР° Рё СҒР°Р»Р°СӮ РёР· Р·РөР»РөРҪСӢС… Р»РёСҒСӮСҢРөРІ *РҙР¶СғСӮР°*. Р—Р°СӮРөРј СҒР»РөРҙСғСҺСӮ СӮСӢРәРІР°, С„СҖСғРәСӮСӢ, РјР°Р»РөРҪСҢРәРёРө РәРІР°РҙСҖР°СӮРҪСӢРө Р»РөРҝРөСҲРәРё РёР· СҮРөСҮРөРІРёСҶСӢ СҒРҫ СҒРіСғСүРөРҪРҪСӢРј РјРҫР»РҫРәРҫРј, Р№РҫРіСғСҖСӮ, РјРҫР»РҫСҮРҪСӢРө РәР°СҲРё Рё РҫРІРҫСүРҪСӢРө РұР»СҺРҙР° РёР· СҶРІРөСӮРҫРІ РұР°РҪР°РҪРҫРІРҫРіРҫ РҙРөСҖРөРІР°.\"]},{\"number\":\"5\",\"text\":[\"РјСғРҙРіР°-РұРҫРҙМЈР°М„ РјР°М„СҲМЈР°-РұРҫРҙМЈР°М„ СҖРҫСӮМЈРёРәР°М„ РіС…СҖМЈСӮР°М„РҪРҪР°\",\"СҲМҒР°СҲМЈРәСғР»УЈ РҝРёСҲМЈСӮМЈР°РәР° РәСҲМЈУЈСҖ РҝСғР»Рё РҝР°М„Р№Р°СҒР°М„РҪРҪР°\"],\"translation\":[\"РҳРј РҝРҫРҙР°СҺСӮ РәРІР°РҙСҖР°СӮРҪСӢРө РҝРёСҖРҫР¶РәРё РёР· *РјСғРҪРі-РҙР°Р»Р°* Рё *СғСҖР°Рҙ-РҙР°Р»Р°*, *СҮР°РҝР°СӮРё* Рё СҖРёСҒ СҒ *РіС…Рё*. РҹРҫСӮРҫРј СҒР»РөРҙСғСҺСӮ СҒР»Р°РҙРҫСҒСӮРё, РҝСҖРёРіРҫСӮРҫРІР»РөРҪРҪСӢРө РёР· РјРҫР»РҫРәР°, СҒР°С…Р°СҖР° Рё РәСғРҪР¶СғСӮР°, Р° СӮР°РәР¶Рө СҖРёСҒРҫРІСӢРө Р»РөРҝРөСҲРәРё, СӮРҫРҝР»РөРҪРҫРө РјРҫР»РҫРәРҫ, РҝРөСҮРөРҪСҢРө, РІСӢРјРҫСҮРөРҪРҪРҫРө РІ РјРҫР»РҫРәРө, Рё СҒР»Р°РҙРәРёР№ СҖРёСҒ.\"]},{\"number\":\"6\",\"text\":[\"РәР°СҖРҝУҜСҖР° Р°РјСҖМЈСӮР° вҖ” РәРөР»УЈ СҖР°РјРұС…Р°М„ РәСҲМЈУЈСҖР°-СҒР°М„СҖР°\",\"Р°РјСҖМЈСӮР° СҖР°СҒР°М„Р»Р°М„, Р°РјР»Р° РҙРІР°М„РҙР°СҲМҒР° РҝСҖР°РәР°М„СҖР°\"],\"translation\":[\"РЎР»Р°РҙРәРёР№ СҖРёСҒ РҝРҫ РІРәСғСҒСғ РҝРҫРҙРҫРұРөРҪ РҪРөРәСӮР°СҖСғ РҝРҫСӮРҫРјСғ, СҮСӮРҫ РІ РҪРөРіРҫ РҙРҫРұР°РІР»РөРҪР° РәР°РјС„Р°СҖР°. РҳРј РҝРҫРҙР°СҺСӮ РұР°РҪР°РҪСӢ Рё Р°СҖРҫРјР°СӮРҪСӢР№, РІРәСғСҒРҪСӢР№ СҒСӢСҖ, РҙРІРөРҪР°РҙСҶР°СӮСҢ РІРёРҙРҫРІ РәРёСҒР»РҫРјРҫР»РҫСҮРҪСӢС… РҝСҖРҫРҙСғРәСӮРҫРІ, РҝСҖРёРіРҫСӮРҫРІР»РөРҪРҪСӢС… СҒ СӮР°РјР°СҖРёРҪРҙРҫРј, Р»Р°Р№РјРҫРј, Р»РёРјРҫРҪРҫРј, Р°РҝРөР»СҢСҒРёРҪРҫРј Рё РіСҖР°РҪР°СӮРҫРј.\"]},{\"number\":\"7\",\"text\":[\"Р»СғСҮРё СҮРёРҪРё СҒР°СҖРҝСғСҖУЈ Р»Р°М„РҙМЈРҙМЈСғ СҖР°СҒР°М„РұР°Р»УЈ\",\"РұС…РҫРҙР¶Р°РҪР° РәРҫСҖРөРҪР° РәСҖМЈСҲМЈРҪМЈР° С…РҫвҖҷР№Рө РәСғСӮУҜС…Р°Р»Рё\"],\"translation\":[\"РӯСӮРё РұР»СҺРҙР° СҒРјРөРҪСҸСҺСӮ *РҝСғСҖРё* РёР· РұРөР»РҫР№ РјСғРәРё СҒ СҒР°С…Р°СҖРҫРј, *РҝСғСҖРё* СҒРҫ РІР·РұРёСӮСӢРјРё СҒР»РёРІРәР°РјРё, *Р»Р°РҙРҙСғ* Рё РҝРёСҖРҫР¶РәРё РёР· *РҙР°Р»Р°*, СҒРІР°СҖРөРҪРҪСӢРө РІ СҒР»Р°РҙРәРҫРј СҖРёСҒРө. РҡСҖРёСҲРҪР° СҒ РҪР°СҒР»Р°Р¶РҙРөРҪРёРөРј РІРәСғСҲР°РөСӮ СҚСӮРё СғРіРҫСүРөРҪРёСҸ.\"]},{\"number\":\"8\",\"text\":[\"СҖР°М„РҙС…РёРәР°М„СҖР° РҝР°РәРәР° Р°РҪРҪР° РІРёРІРёРҙС…Р° РұР№Р°РҪМғРҙР¶Р°РҪР°\",\"РҝР°СҖР°РјР° Р°М„РҪР°РҪРҙРө РәСҖМЈСҲМЈРҪМЈР° РәРҫСҖРөРҪР° РұС…РҫРҙР¶Р°РҪР°\"],\"translation\":[\"РЎ РІРөР»РёРәРёРј СғРҙРҫРІРҫР»СҢСҒСӮРІРёРөРј РҡСҖРёСҲРҪР° РөСҒСӮ СҖРёСҒ, РҫРІРҫСүРё СҒ РәР°СҖСҖРё, СҒР»Р°РҙРҫСҒСӮРё Рё РҝРөСҮРөРҪСҢРө, РҝСҖРёРіРҫСӮРҫРІР»РөРҪРҪСӢРө РЁСҖРёРјР°СӮРё Р Р°РҙС…Р°СҖР°РҪРё.\"]},{\"number\":\"9\",\"text\":[\"СҮС…РҫР»Рө-РұРҫР»Рө Р»Р°М„РҙМЈРҙМЈСғ РәС…Р°М„Р№ СҲМҒСҖУЈ-РјР°РҙС…СғРјР°РҪМҮРіР°Р»Р°\",\"РұР°РіР°Р»Р° РұР°М„РҙР¶Р°М„Р№ Р°М„СҖР° РҙРөР№Р° С…Р°СҖРё-РұРҫР»Рҫ\"],\"translation\":[\"Р—Р°РұР°РІРҪСӢР№ РҙСҖСғРі РҡСҖРёСҲРҪСӢ *РұСҖР°С…РјР°РҪ* РңР°РҙС…СғРјР°РҪРіР°Р», РҫРұРҫР¶Р°СҺСүРёР№ *Р»Р°РҙРҙСғ*, СҒСӮСҖРөРјРёСӮСҒСҸ Р·Р°РҝРҫР»СғСҮРёСӮСҢ РөРіРҫ РІСҒРөРјРё РҝСҖР°РІРҙР°РјРё Рё РҪРөРҝСҖР°РІРҙР°РјРё. РһРҪ РөСҒСӮ *Р»Р°РҙРҙСғ* Рё РәСҖРёСҮРёСӮ: В«РҘР°СҖРёРұРҫР»! РҘР°СҖРёРұРҫР»!В», Р° РҝРҫСӮРҫРј РёР·РҙР°РөСӮ СҒРјРөСҲРҪСӢРө Р·РІСғРәРё, С…Р»РҫРҝР°СҸ СҖСғРәР°РјРё Сғ СҒРөРұСҸ РҝРҫРҙРјСӢСҲРәР°РјРё.\"]},{\"number\":\"10\",\"text\":[\"СҖР°М„РҙС…РёРәР°М„РҙРё РіР°РҪМЈРө С…РөСҖРёвҖҷ РҪР°Р№Р°РҪРөСҖР° РәРҫРҪРө\",\"СӮСҖМЈРҝСӮР° С…РҫвҖҷР№Рө РәС…Р°М„Р№ РәСҖМЈСҲМЈРҪМЈР° РҙР¶Р°СҲМҒРҫРҙР°М„-РұС…Р°РІР°РҪРө\"],\"translation\":[\"РқРөР·Р°РјРөСӮРҪРҫ РҝРҫРҙРіР»СҸРҙСӢРІР°СҸ Р·Р° Р Р°РҙС…Р°СҖР°РҪРё Рё Р•Рө РҝРҫРҙСҖСғР¶РәР°РјРё *РіРҫРҝРё*, РҡСҖРёСҲРҪР° СҒ СғРҙРҫРІРҫР»СҢСҒСӮРІРёРөРј РҫРұРөРҙР°РөСӮ РІ РҙРҫРјРө РјР°СӮРөСҖРё РҜСҲРҫРҙСӢ.\"]},{\"number\":\"11\",\"text\":[\"РұС…РҫРҙР¶Р°РҪР°М„РҪСӮРө РҝРёР№Рө РәСҖМЈСҲМЈРҪМЈР° СҒСғРұР°М„СҒРёСӮР° РұР°М„СҖРё\",\"СҒР°РұРө РјСғРәС…Р° РҝСҖР°РәСҲМЈР°М„Р»РҫР№ С…РҫвҖҷР№Рө СҒР°М„СҖРё СҒР°М„СҖРё\"],\"translation\":[\"РҹРҫСҒР»Рө РҫРұРөРҙР° РҡСҖРёСҲРҪР° РҝСҢРөСӮ Р°СҖРҫРјР°СӮРҪСғСҺ СҖРҫР·РҫРІСғСҺ РІРҫРҙСғ. Р—Р°СӮРөРј РІСҒРө РјР°Р»СҢСҮРёРәРё РҝРҫ РҫСҮРөСҖРөРҙРё РҝРҫР»РҫСүСғСӮ СҖРҫСӮ.\"]},{\"number\":\"12\",\"text\":[\"С…Р°СҒСӮР°-РјСғРәС…Р° РҝСҖР°РәСҲМЈР°М„Р»РёР№Р°М„ РҙР¶Р°СӮР° СҒР°РәС…Р°М„-РіР°РҪМЈРө\",\"Р°М„РҪР°РҪРҙРө РұРёСҲМҒСҖР°М„РјР° РәРҫСҖРө РұР°Р»Р°РҙРөРІР°-СҒР°РҪРө\"],\"translation\":[\"РһРјСӢРІ СҖСғРәРё Рё СҖСӮСӢ, РјР°Р»СҢСҮРёРәРё РІРјРөСҒСӮРө СҒ Р“РҫСҒРҝРҫРҙРҫРј Р‘Р°Р»Р°СҖР°РјРҫР№ РІ РұР»Р°Р¶РөРҪРҪРҫРј РҪР°СҒСӮСҖРҫРөРҪРёРё РёРҙСғСӮ РҫСӮРҙСӢС…Р°СӮСҢ.\"]},{\"number\":\"13\",\"text\":[\"РҙР¶Р°М„РјРұСғР»Р° СҖР°СҒР°М„Р»Р° Р°М„РҪРө СӮР°М„РјРұУҜР»Р°-РјР°СҒР°М„Р»Р°М„\",\"СӮР°М„С…Р°М„ РәС…РөР№Рө РәСҖМЈСҲМЈРҪМЈР°-СҮР°РҪРҙСҖР° СҒСғРәС…Рө РҪРёРҙСҖР°М„ РіРөР»Р°М„\"],\"translation\":[\"РҹРҫСӮРҫРј РҙРІР° РҝР°СҒСӮСғСҲРәР°, Р”Р¶Р°РјРұСғР»Р° Рё Р Р°СҒР°Р»Р°, РҝСҖРёРҪРҫСҒСҸСӮ РҡСҖРёСҲРҪРө *РҝР°РҪ* РёР· РҫСҖРөС…РҫРІ РұРөСӮРөР»СҸ, РёР·СӢСҒРәР°РҪРҪСӢС… СҒРҝРөСҶРёР№ Рё *РәР°СӮРөСҮСғ*. РһСӮРІРөРҙР°РІ *РҝР°РҪР°*, РҡСҖРёСҲРҪР°СҮР°РҪРҙСҖР° СҒСҮР°СҒСӮР»РёРІРҫ РҫСӮРҝСҖР°РІР»СҸРөСӮСҒСҸ РҝРҫСҮРёРІР°СӮСҢ.\"]},{\"number\":\"14\",\"text\":[\"РІРёСҲМҒР°М„Р»Р°М„РәСҲМЈР° СҲМҒРёРәС…Рё-РҝСғСҮСҮС…Р°-СҮР°М„РјР°СҖР° РҙМЈС…СғР»Р°М„Р№Р°\",\"Р°РҝУҜСҖРІР° СҲМҒР°Р№Р°М„Р№Р° РәСҖМЈСҲМЈРҪМЈР° СҒСғРәС…Рө РҪРёРҙСҖР°М„ РҙР¶Р°М„Р№Р°\"],\"translation\":[\"РҡРҫРіРҙР° РҡСҖРёСҲРҪР° РұР»Р°Р¶РөРҪРҪРҫ СҒРҝРёСӮ РҪР° СҖРҫСҒРәРҫСҲРҪРҫР№ РҝРҫСҒСӮРөР»Рё, Р•РіРҫ СҒР»СғРіР° Р’РёСҲР°Р»Р°РәСҲР° РҫРұРјР°С…РёРІР°РөСӮ Р•РіРҫ РҫРҝР°С…Р°Р»РҫРј РёР· РҝР°РІР»РёРҪСҢРёС… РҝРөСҖСҢРөРІ.\"]},{\"number\":\"15\",\"text\":[\"РҙР¶Р°СҲМҒРҫРјР°СӮУЈ-Р°М„РҙР¶РҪМғР°М„ РҝРөР№Рө РҙС…Р°РҪРёСҲМЈСӮМЈС…Р°М„-Р°М„РҪРёСӮРҫ\",\"СҲМҒСҖУЈ-РәСҖМЈСҲМЈРҪМЈР°-РҝСҖР°СҒР°М„РҙР° СҖР°М„РҙС…Р°М„ РұС…СғРҪМғРҙР¶Рө С…РҫР№Рө РҝСҖУЈСӮРҫ\"],\"translation\":[\"РҹРҫ РҝСҖРҫСҒСҢРұРө РјР°СӮРөСҖРё РҜСҲРҫРҙСӢ *РіРҫРҝРё* Р”С…Р°РҪРёСҲСӮС…Р° РҝСҖРёРҪРҫСҒРёСӮ РЁСҖРёРјР°СӮРё Р Р°РҙС…Р°СҖР°РҪРё СӮР°СҖРөР»РәСғ СҒ РҫСҒСӮР°СӮРәР°РјРё РөРҙСӢ РҡСҖРёСҲРҪСӢ, Рё РўР° РҝСҖРёРҪРёРјР°РөСӮ РёС… СҒ РІРөР»РёРәРёРј РҪР°СҒР»Р°Р¶РҙРөРҪРёРөРј.\"]},{\"number\":\"16\",\"text\":[\"Р»Р°Р»РёСӮР°М„РҙРё СҒР°РәС…УЈ-РіР°РҪМЈР° Р°РІР°СҲМҒРөСҲМЈР° РҝР°М„Р№Р°\",\"РјР°РҪРө РјР°РҪРө СҒСғРәС…Рө СҖР°М„РҙС…Р°М„-РәСҖМЈСҲМЈРҪМЈР°-РіСғРҪМЈР° РіР°М„Р№Р°\"],\"translation\":[\"РһСҒСӮР°СӮРәРё РҝРёСүРё РҡСҖРёСҲРҪСӢ РҙРҫСҒСӮР°СҺСӮСҒСҸ РӣР°Р»РёСӮРө Р”РөРІРё Рё РҙСҖСғРіРёРј *РіРҫРҝРё*, РәРҫСӮРҫСҖСӢРө РІ СҒРІРҫРёС… СҒРөСҖРҙСҶР°С… РІ РІРөР»РёРәРҫР№ СҖР°РҙРҫСҒСӮРё РҝСҖРҫСҒР»Р°РІР»СҸСҺСӮ Р Р°РҙС…Р°СҖР°РҪРё Рё РҡСҖРёСҲРҪСғ.\"]},{\"number\":\"17\",\"text\":[\"С…Р°СҖРё-Р»УЈР»Р°М„ СҚРә-РјР°М„СӮСҖР° РҙР¶Р°М„С…Р°М„СҖР° РҝСҖР°РјРҫРҙР°\",\"РұС…РҫРіР°М„СҖР°СӮРё РіР°М„Р№ СӮМЈС…Р°М„РәСғСҖР° РұС…Р°РәР°СӮРёРІРёРҪРҫРҙР°\"],\"translation\":[\"РўС…Р°РәСғСҖ Р‘С…Р°РәСӮРёРІРёРҪРҫРҙ, СҮСҢСҸ РөРҙРёРҪСҒСӮРІРөРҪРҪР°СҸ СҖР°РҙРҫСҒСӮСҢ вҖ” РёРіСҖСӢ Р“РҫСҒРҝРҫРҙР° РҘР°СҖРё, РҝРҫРөСӮ СҚСӮСғ РҝРөСҒРҪСҺ В«Р‘С…РҫРіР°-Р°СҖР°СӮРёВ».\"]},{\"text\":[\"РұС…Р°РҙР¶Р° РіРҫРІРёРҪРҙР° РіРҫРІРёРҪРҙР° РіРҫРҝР°М„Р»Р°\",\"РіРёСҖРёРҙС…Р°М„СҖРё РіРҫРҝУЈРҪР°М„СӮС…Р° РҪР°РҪРҙР° РҙСғР»Р°Р»Р°\",\"РұС…Р°РҙР¶Р° РіРҫРІРёРҪРҙР° РіРҫРІРёРҪРҙР° РіРҫРҝР°М„Р»Р°\",\"РҪР°РҪРҙР° РҙСғР»Р°Р»Р° РҙР¶Р°Р№Р° РҙР¶Р°Р№Р° СҲМҒР°СҮРё РҙСғР»Р°Р»Р°\",\"СҲМҒР°СҮРё РҙСғР»Р°Р»Р° РҙР¶Р°Р№Р° РҙР¶Р°Р№Р° РіР°СғСҖР° РіРҫРҝР°М„Р»Р°\"]}],\"embeds\":[{\"title\":\"РЁСҖРёР»Р° Р“РҫРІРёРҪРҙР° РңР°С…Р°СҖР°РҙР¶\",\"embed_url\":\"https://soundcloud.com/bharatimaharaj/govinda-maharaj-sri-bhoga\",\"iframe_url\":\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Fgovinda-maharaj-sri-bhoga\",\"embed_code\":\"\u003ciframe width=\\\"100%\\\" height=\\\"20\\\" scrolling=\\\"no\\\" frameborder=\\\"no\\\" allow=\\\"autoplay\\\" src=\\\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Fgovinda-maharaj-sri-bhoga\\\"\u003e\u003c/iframe\u003e\"},{\"title\":\"РқР°РІР°РҙРІРёРҝ Р”С…Р°Рј\",\"embed_url\":\"https://soundcloud.com/bharatimaharaj/navadwip-scsm-bhaja-bhakata\",\"iframe_ur
