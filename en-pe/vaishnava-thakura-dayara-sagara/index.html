association.\"]},{\"number\":\"3\",\"text\":[\"ekākī āmāra    nāhi pāya bala\",\"    hari-nāma-saṅkīrtane\",\"tumi kṛpā kari    śraddhā-bindu diyā\",\"    deha’ kṛṣṇa-nāma-dhane\"],\"translation\":[\"Alone I do not have the ability to properly chant the Lord’s Name. Mercifully give me a drop of faith and bestow upon me the wealth of Kṛṣṇa’s Name.\"]},{\"number\":\"4\",\"text\":[\"kṛṣṇa se tomāra    kṛṣṇa dite pāra\",\"    tomāra śakati āchhe\",\"āmi ta’ kāṅgāla    ‘kṛṣṇa kṛṣṇa’ bali\",\"    dhāi tava pāchhe pāchhe\"],\"translation\":[\"Kṛṣṇa is yours. You can give Kṛṣṇa. You have that power. I am very poor. Calling, ‘Kṛṣṇa!’ ‘Kṛṣṇa!’, I run after you.\"]},{\"text\":[\"(āmi) (dhāi tava pāchhe pāchhe)\",\"(kṛṣṇa dhana pābar āśe    dhāi tava pāchhe pāchhe)\",\"(tumi dile kṛṣṇa dite pāra)\",\"(kṛṣṇa tomār hṛdayer dhan    tumi dileo dite pāra)\",\"(kṛṣṇa debār śakti-dhara    tumi dileo dite pāra)\"],\"translation\":[\"I run after you. I run after you in hope of attaining the wealth of Kṛṣṇa. If you desire to give Kṛṣṇa, you can give Him. If you desire to give, you can give. Kṛṣṇa is the wealth of your heart. You have the power to give Kṛṣṇa. If only you desire to give Kṛṣṇa, you can give Him.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.S. Govinda Dev-Goswami Maharaj\",\"ru\":\"Шрила Б.С. Говинда Дев-Госвами Махарадж\",\"ua\":\"Шріла Б.С. Ґовінда Дев-Ґосвамі Махарадж\"},\"embed_url\":\"https://soundcloud.com/kostya-netrebenko/07-ohe-vaishnava-thakura-dayara-sagara-12\"},{\"title\":{\"en\":\"Srila B.N. Acharya Maharaj\",\"ru\":\"Шрила Б.Н. Ачарья Махарадж\",\"ua\":\"Шріла Б.Н. Ачарʼя Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/acharya-maharaj-ohe-vaishnava\"},{\"title\":{\"en\":\"Nabadwip temple\",\"ru\":\"Навадвипский храм\",\"ua\":\"Навадвіпський храм\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/navadwip-scsm-ohe-vaisnava\"},{\"title\":{\"en\":\"Sudarshan Prabhu\",\"ru\":\"Сударшан Прабху\",\"ua\":\"Сударшан Прабгу\"},\"e
