ber\":\"3\",\"text\":[\"ājānu lambita bhuja divya kalevara\",\"ananta pratibhā bharā divya guṇadhara\"],\"translation\":[\"Your divine form’s arms extend to your knees. You possess infinite genius and divine qualities.\"]},{\"number\":\"4\",\"text\":[\"gaura-kṛṣṇe jāni tava abhinna svarūpa\",\"saṁsāra tarite ebe śuddha-bhakta-rūpa\"],\"translation\":[\"I know that you are nondifferent from Śrī Gaura Kṛṣṇa and have now assumed the form of a pure devotee to deliver the world.\"]},{\"number\":\"5\",\"text\":[\"rūpānuga-dhārā tumi kara ālokita\",\"prabhākara sama prabhā bhuvana-vidita\"],\"translation\":[\"You illuminate Śrī Rūpa’s line. Like the sun, your effulgence is known throughout the world.\"]},{\"number\":\"6\",\"text\":[\"śuddha bhakti prachārite tomā sama nāi\",\"akalaṅka indu yena dayāla nitāi\"],\"translation\":[\"There is no one like you to preach pure devotion. You are a spotless moon like merciful Nityānanda.\"]},{\"number\":\"7\",\"text\":[\"ullasita viśva-vāsī labhe prema-dhana\",\"ānande nāchiyā gāhe tava guṇa-gaṇa\"],\"translation\":[\"Attaining the wealth of divine love (by your grace), joyful souls all over the world sing your glories, dancing in ecstasy.\"]},{\"number\":\"8\",\"text\":[\"sthāpilā āśrama bahu jagata mājhāre\",\"pāramahaṁsa-dharma-jñāna śikṣāra prachāre\"],\"translation\":[\"You established many ashrams all over the world to teach paramahaṁsa-dharma (the way of the true Vaiṣṇavas).\"]},{\"number\":\"9\",\"text\":[\"chintyāchintya veda-jñāne tumi adhikārī\",\"sakala saṁśaya chhettvā susiddhānta-dhārī\"],\"translation\":[\"You are a master of both conceivable and inconceivable Vedic knowledge. You cut away all doubts and represent the true teachings.\"]},{\"number\":\"10\",\"text\":[\"tomāra mahimā gāhe goloka maṇḍale\",\"nitya-siddha parikare tava līlā-sthale\"],\"translation\":[\"Your eternally liberated associates sing your glories in Goloka, the realm of your Pastimes.\"]},{\"number\":\"11\",\"text\":[\"patita pāvana tumi dayāra samīra\",\"sarva-kārye sunipuṇa satya-sugambhīra\"],\"translation\":[\"You are the saviour of the fallen and a breeze of mercy. You are truthful, deep, and expert in all types of service.\"]},{\"number\":\"12\",\"text\":[\"apūrva lekhanī dhārā pragāḍha pāṇḍitya\",\"sadā hāsya miṣṭa-bhāṣī suśīla kavitva\"],\"translation\":[\"Your writings are wonderful, and your learning is profound. You always smile and speak sweet words. Your poetry is perfect.\"]},{\"number\":\"13\",\"text\":[\"sādhu-saṅge sadānandī sarala vinayī\",\"sabhā-madhye vaktā śreṣṭha sarvatra vijayī\"],\"translation\":[\"You are always joyful in the sādhus’ association. You are simple and humble. In assemblies, you are the best speaker. Everywhere you are victorious.\"]},{\"number\":\"14\",\"text\":[\"gauḍīya gagane tumi āchārya-bhāskara\",\"nirantara sevā-priya miṣṭa kaṇṭhasvara\"],\"translation\":[\"In the sky of the Gauḍīya Vaiṣṇavas, you are the sun-like Āchārya. You are always fond of service, and your voice is sweet.\"]},{\"number\":\"15\",\"text\":[\"tomāra karuṇā māge trikāla vilāse\",\"gāndharvikā-giridhārī sevā-mātra āśe\"],\"translation\":[\"Throughout the play of the past, present, and future, this servant prays for your mercy, desiring only to serve Śrī Śrī Gāndharvikā-Giridhārī.\"]},{\"number\":\"16\",\"text\":[\"kṛpā kara ohe prabhu śrī-gaura-prakāśa\",\"ārati karaye sadā e adhama dāsa\"],\"translation\":[\"Be merciful, O lord, manifestation of Śrī Gaurāṅga! This fallen servant always worships you.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.K. Ashram Maharaj\",\"ru\":\"Шрила Б.К. Ашрам Махарадж\",\"ua\":\"Шріла Б.К. Ашрам Махарадж\"},\"embed_url\":\"https://soundcloud.com/scsmathcolombia/3-sri-guru-arati\"},{\"title\":{\"en\":\"Srila B.N. Acharya Maharaj\",\"ru\":\"Шрила Б.Н. Ачарья Махарадж\",\"ua\":\"Шріла Б.Н. Ачарʼя Махарадж\"},\"embed_url\":\"https://soundcloud.com/kostya-netrebenko/003-jayajayagurudeveraratiujjvala-5\"},{\"title\":{\"en\":\"Nabadwip temple\",\"ru\":\"Н
