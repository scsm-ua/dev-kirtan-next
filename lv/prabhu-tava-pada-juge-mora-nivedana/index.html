n3c:[\"$\",\"$L46\",null,{\"bookId\":\"lv\",\"telegraphUrl\":\"https://telegra.ph/Śrī-Śikṣāṣṭakam-4-07-05\"}]\n3d:[\"$\",\"section\",null,{\"className\":\"SongHeader\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"SongHeader__title\",\"children\":[[\"$\",\"div\",\"Śrī Śikṣāṣṭakam 4\",{\"children\":\"Śrī Śikṣāṣṭakam 4\"}]]}],null,[],[[\"$\",\"div\",\"Šrīla Bhaktivinoda Thākurs\",{\"className\":\"SongHeader__author\",\"children\":[\"$\",\"a\",null,{\"href\":\"/lv/authors\",\"children\":\"Šrīla Bhaktivinoda Thākurs\"}]}]]]}]\n"])</script><script>self.__next_f.push([1,"3e:[\"$\",\"$L47\",null,{\"bookId\":\"lv\",\"label\":\"Parādīt tulkojumu\",\"song\":{\"meta\":{\"page\":186,\"first_line\":\"prabhu tava pada-juge mora nivedana\"},\"title\":[\"Śrī Śikṣāṣṭakam 4\"],\"author\":[\"Šrīla Bhaktivinoda Thākurs\"],\"verses\":[{\"translation\":[\"Ceturtais Šrī Šikšāštakam pants ir šāds:\"]},{\"text\":[\"na dhanaṁ na janaṁ na sundarīṁ\",\"kavitāṁ vā jagad-īśa kāmaye\",\"mama janmani janmanīśvare\",\"bhavatād bhaktir ahaitukī tvayi\"],\"translation\":[\"“Kungs, es netiecos pēc dārgumu uzkrāšanas, sekotājiem, skaistām sievietēm un pat ne pēc glābšanas. Mana vienīgā lūgšana ir par nebeidzamu kalpošanu uzticībā Tev, dzīvi pēc dzīves.”\",\"*Paskaidrojums grāmatā: [The Golden Volcano of Divine Love. Part II Śikṣāṣṭakam: Unalloyed Devotion](https://krishnasearch.com/#/book/en-GoldenVolcanoofDivineLove?c=15\u0026p=8).*\"]},{\"number\":\"1\",\"text\":[\"prabhu tava pada-juge mora nivedana\",\"nāhi māgi deho-sukha, vidyā dhana, jana\"],\"translation\":[\"Kungs, pazemībā un paklausībā es krītu pie tavām lotosam līdzīgajām pēdām. Es nelūdzu tev jutekliskas baudas, zināšanas, bagātību vai pēcnācējus.\"]},{\"number\":\"2\",\"text\":[\"nāhi māgi svarga, āro mokṣa nāhi māgi\",\"nā kori prārthanā kono vibhūtira lāgi\"],\"translation\":[\"Es nelūdzu dzīvi uz paradīzes planētām, man nevajag atbrīvošanu no šīs materiālās esības. Es nelūdzu arī mistiskas spējas.\"]},{\"number\":\"3\",\"text\":[\"nija-karma-guṇa-doṣe je je janma pāi\",\"janme janme jeno tava nāma-guṇa gāi\"],\"translation\":[\"Lai arī kāda dzimšana man būtu jāpieņem atbilstoši manai pagātnes rīcībai, es lūdzos, lai Tu vienīgi ļauj man dzīvi pēc dzīves dziedāt tavu Svēto Vārdu.\"]},{\"number\":\"4\",\"text\":[\"ei mātra āśā mama tomāra charaṇe\",\"ahaitukī bhakti hṛde jāge anukṣaṇe\"],\"translation\":[\"Šāda ir mana vienīgā cerība, mana kvēlākā vēlēšanās, mana lūgšana, vēršanās pie tavām lotosa pēdām — lai  garīgas kalpošanas straume nepārstājoši atmostas manā sirdī un plūst pie tevis.\"]},{\"number\":\"5\",\"text\":[\"biṣoye je prīti ebe āchoye āmāra\",\"sei-mata prīti hauk charaṇe tomāra\"],\"translation\":[\"Lai es iemīlu tavas lotosam līdzīgās pēdas tik pat ļoti, cik ļoti es šobrīd mīlu jutekliskās baudas. Pārvirzi manu pieķeršanos no jutekļu objektiem uz tavām lotosa pēdām.\"]},{\"number\":\"6\",\"text\":[\"vipade sampade tāhā thākuka samabhāve\",\"dine dine bṛddhi hauk nāmera prabhāve\"],\"translation\":[\"Lai veiksmē, laimē vai bēdās es vienmēr palieku nosvērts. Lai Svētā Vārda ietekmē mana pieķeršanās tev aug dienu no dienas.\"]},{\"number\":\"7\",\"text\":[\"paśu-pakṣī hoye thāki svarge bā niroye\",\"tava bhakti rahu bhaktivinoda-hṛdoye\"],\"translation\":[\"Lai es kļūstu par putnu vai zvēru, lai dzīvoju paradīzē vai ellē, bet ļauj pazemīgajam Bhaktivinodam savas sirds dziļumos vienmēr lolot mīlošu garīgu kalpošanu tev.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.N. Acharya Maharaj\",\"ru\":\"Шрила Б.Н. Ачарья Махарадж\",\"ua\":\"Шріла Б.Н. Ачарʼя Махарадж\"},\"embed_url\":\"https://soundcloud.com/kostya-netrebenko/103-srisrisiksastakam4-4\"},{\"title\":{\"en\":\"Bhakti Lalita Devi\",\"ru\":\"Бхакти Лалита Деви\",\"ua\":\"Бгакті Лаліта Деві\"},\"embed_url\":\"https://soundcloud.com/bhakti-lalita-devi/prabhu-tava-pada-juge\"}]},\"hasWbw\":false,\"hasVersesText\":true,\"hasVersesTranslations\":true,\"fullInlineWbw\":false}}]\n"])</script><script>self.__next_f.push([1,"3
